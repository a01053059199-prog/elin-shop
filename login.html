<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 로그인</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fbfaf8; color: #171717; font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif; }
    a { color: inherit; }
    .auth { width: min(420px, calc(100% - 32px)); background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 26px; }
    .brand { display: block; text-align: center; font-family: Georgia, "Times New Roman", serif; font-size: 38px; letter-spacing: .08em; text-decoration: none; margin-bottom: 22px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0 0 18px; color: #6a6a6a; line-height: 1.6; }
    label { display: block; margin: 13px 0 7px; font-weight: 800; font-size: 14px; }
    input { width: 100%; border: 1px solid #ddd5cb; border-radius: 6px; padding: 12px; outline: 0; }
    .remember { display: flex; align-items: center; gap: 8px; margin: 12px 0 0; color: #555; font-size: 13px; font-weight: 700; }
    .remember input { width: auto; }
    button { width: 100%; height: 46px; margin-top: 18px; border: 0; border-radius: 4px; background: #171717; color: #fff; font-weight: 900; cursor: pointer; }
    .message { display: none; margin-top: 14px; padding: 12px; border-radius: 6px; background: #f3f0ea; color: #40513b; line-height: 1.5; }
    .message.show { display: block; }
    .foot { margin-top: 18px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <main class="auth">
    <a class="brand" href="/">ELIN</a>
    <h1>로그인</h1>
    <p>가입한 아이디로 로그인하세요.</p>
    <form id="loginForm">
      <label for="username">아이디</label>
      <input id="username" required autocomplete="username" />
      <label for="password">비밀번호</label>
      <input id="password" type="password" required autocomplete="current-password" />
      <label class="remember"><input id="rememberMemberLogin" type="checkbox"> 아이디/비밀번호 기억하기</label>
      <button type="submit">로그인</button>
      <div class="message" id="message"></div>
    </form>
    <div class="foot">아직 계정이 없나요? <a href="/signup.html">회원가입</a></div>
  </main>
  <script>
    const message = document.querySelector("#message");
    const memberRememberKey = "elinMemberRemember";

    function loadRememberedMemberLogin() {
      try {
        const saved = JSON.parse(localStorage.getItem(memberRememberKey) || "{}");
        if (!saved.username && !saved.password) return;
        document.querySelector("#username").value = saved.username || "";
        document.querySelector("#password").value = saved.password || "";
        document.querySelector("#rememberMemberLogin").checked = true;
      } catch {}
    }

    function saveRememberedMemberLogin(username, password) {
      if (!document.querySelector("#rememberMemberLogin").checked) {
        localStorage.removeItem(memberRememberKey);
        return;
      }
      localStorage.setItem(memberRememberKey, JSON.stringify({ username, password }));
    }

    loadRememberedMemberLogin();
    document.querySelector("#loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const username = document.querySelector("#username").value;
      const password = document.querySelector("#password").value;
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username,
          password
        })
      });
      const result = await response.json();
      message.classList.add("show");
      if (!response.ok) {
        message.textContent = result.error || "로그인에 실패했습니다.";
        return;
      }
      message.textContent = "로그인되었습니다. 쇼핑몰로 이동합니다.";
      saveRememberedMemberLogin(username, password);
      setTimeout(() => location.href = "/", 700);
    });
    fetch("/api/auth/me").then(response => response.json()).then(result => {
      if (result.member) location.href = "/";
    });
  </script>
</body>
</html>
