<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 상품상세</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #fbfaf8;
      color: #171717;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    header { border-bottom: 1px solid #e6e0d8; background: #fff; }
    .bar {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0;
    }
    nav { display: flex; align-items: center; gap: 14px; color: #555; font-size: 14px; }
    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 20px 70px;
    }
    .crumb {
      margin-bottom: 22px;
      color: #777;
      font-size: 13px;
    }
    .product-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 410px;
      gap: 42px;
      align-items: start;
    }
    .gallery {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .thumbs {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 130px);
      overflow: auto;
      padding-right: 2px;
    }
    .thumbs button {
      width: 86px;
      aspect-ratio: 1 / 1;
      padding: 0;
      border: 1px solid #e1dbd2;
      border-radius: 4px;
      background: #f1eee8;
      overflow: hidden;
      cursor: pointer;
    }
    .thumbs button.active { border: 2px solid #171717; }
    .thumbs img,
    .main-image img,
    .detail-images img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .main-image {
      background: #f1eee8;
      border-radius: 4px;
      overflow: hidden;
      min-height: 520px;
    }
    .main-image img { aspect-ratio: 4 / 5; height: auto; }
    .buy-panel {
      position: sticky;
      top: 18px;
      background: #fff;
      border: 1px solid #e6e0d8;
      border-radius: 6px;
      padding: 24px;
    }
    .label {
      display: inline-block;
      margin-bottom: 12px;
      color: #b71f2a;
      font-size: 12px;
      font-weight: 900;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 25px;
      line-height: 1.35;
      word-break: keep-all;
    }
    .sub {
      margin-bottom: 18px;
      color: #777;
      font-size: 13px;
      line-height: 1.7;
    }
    .price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 18px 0;
      border-top: 1px solid #eee8df;
      border-bottom: 1px solid #eee8df;
      font-size: 24px;
      font-weight: 900;
    }
    .price del { color: #aaa; font-size: 14px; font-weight: 500; }
    .info-table {
      margin: 18px 0;
      display: grid;
      gap: 10px;
      color: #555;
      font-size: 13px;
    }
    .info-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
    }
    .info-row strong { color: #171717; }
    label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 800;
      font-size: 14px;
    }
    select, input {
      width: 100%;
      border: 1px solid #ddd5cb;
      border-radius: 4px;
      padding: 13px;
      background: #fff;
    }
    .qty-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
      align-items: end;
    }
    .total {
      margin-top: 18px;
      padding: 16px 0 0;
      border-top: 1px solid #eee8df;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 900;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 18px;
    }
    button.action {
      height: 50px;
      border: 0;
      border-radius: 4px;
      background: #171717;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    button.secondary {
      background: #f3f0ea;
      color: #171717;
      border: 1px solid #e1dbd2;
    }
    .accordion {
      margin-top: 20px;
      border-top: 1px solid #eee8df;
    }
    details {
      border-bottom: 1px solid #eee8df;
      padding: 14px 0;
    }
    summary {
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    details p {
      margin: 12px 0 0;
      color: #666;
      line-height: 1.8;
      font-size: 13px;
    }
    .section {
      margin-top: 58px;
      border-top: 1px solid #171717;
      padding-top: 24px;
      text-align: center;
    }
    .section h2 {
      margin: 0 0 18px;
      font-size: 18px;
      text-align: center;
    }
    .detail-copy {
      max-width: 720px;
      margin: 0 auto;
      color: #555;
      line-height: 1.9;
      word-break: keep-all;
      text-align: center;
    }
    .detail-images {
      margin: 22px auto 0;
      display: grid;
      gap: 14px;
      max-width: 760px;
      justify-items: center;
    }
    .detail-images figure {
      margin: 0;
      width: 100%;
      max-width: 720px;
      background: #f1eee8;
      border-radius: 4px;
      overflow: hidden;
    }
    .detail-images img {
      height: auto;
      aspect-ratio: 4 / 5;
    }
    .guide-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e6e0d8;
      font-size: 14px;
    }
    .guide-table th,
    .guide-table td {
      border-bottom: 1px solid #eee8df;
      padding: 14px;
      text-align: left;
      vertical-align: top;
      line-height: 1.7;
    }
    .guide-table th {
      width: 170px;
      background: #f5f1eb;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }
    .related img {
      width: 100%;
      aspect-ratio: 1 / 1.15;
      object-fit: cover;
      background: #f1eee8;
      border-radius: 4px;
    }
    .related strong {
      display: block;
      margin-top: 9px;
      font-size: 14px;
      line-height: 1.4;
    }
    .related span {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 800;
    }
    .empty {
      padding: 80px 20px;
      text-align: center;
      background: #fff;
      border: 1px solid #e6e0d8;
      border-radius: 6px;
    }
    .cart-added {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,.12);
    }
    .cart-added.open { display: flex; }
    .cart-added-box {
      width: min(460px, 100%);
      background: #fff;
      border: 1px solid #e6e0d8;
      box-shadow: 0 24px 70px rgba(0,0,0,.12);
      padding: 28px 34px 34px;
      position: relative;
    }
    .cart-added-close {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #171717;
      font-size: 34px;
      line-height: 1;
    }
    .cart-added-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
      font-weight: 800;
      font-size: 18px;
    }
    .cart-added-product {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 18px;
      align-items: center;
      margin-bottom: 28px;
    }
    .cart-added-product img {
      width: 88px;
      height: 88px;
      object-fit: cover;
      border: 1px solid #e6e0d8;
      background: #f3f0ea;
    }
    .cart-added-product strong {
      display: block;
      margin-bottom: 8px;
      font-size: 17px;
      line-height: 1.35;
      word-break: keep-all;
    }
    .cart-added-product span {
      display: block;
      color: #666;
      line-height: 1.55;
    }
    .cart-added-actions {
      display: grid;
      gap: 11px;
    }
    .cart-added-actions button,
    .cart-added-actions a {
      display: grid;
      place-items: center;
      min-height: 58px;
      border: 1px solid #171717;
      background: #fff;
      color: #171717;
      font-weight: 900;
      text-align: center;
      cursor: pointer;
    }
    .cart-added-actions .checkout-now {
      background: #171717;
      color: #fff;
    }
    .cart-added-actions .continue {
      min-height: 34px;
      border: 0;
      text-decoration: underline;
      background: transparent;
      font-weight: 500;
    }
    @media (max-width: 920px) {
      .product-layout { grid-template-columns: 1fr; gap: 24px; }
      .buy-panel { position: static; }
      .gallery { grid-template-columns: 1fr; }
      .thumbs {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        grid-auto-flow: column;
        overflow-x: auto;
        max-height: none;
        order: 2;
      }
      .thumbs button { width: 100%; }
      .main-image { min-height: 0; }
      .related-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 520px) {
      .bar { align-items: flex-start; flex-direction: column; }
      .brand { font-size: 30px; }
      .page { padding: 18px 14px 50px; }
      .buy-panel { padding: 18px; }
      .actions { grid-template-columns: 1fr; }
      .qty-row { grid-template-columns: 1fr; }
      .thumbs {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        grid-auto-flow: row;
        overflow: visible;
        gap: 8px;
      }
      .thumbs button {
        width: 100%;
      }
      .section {
        width: 100%;
        margin-left: auto;
        margin-right: auto;
        text-align: center;
      }
      .section h2 {
        text-align: center;
      }
      .detail-copy {
        width: 100%;
        max-width: 360px;
        margin-left: auto;
        margin-right: auto;
        text-align: center;
      }
      .detail-images {
        width: 100%;
        max-width: 430px;
        margin-left: auto;
        margin-right: auto;
        justify-items: center;
      }
      .detail-images figure {
        width: 100%;
        max-width: 430px;
        margin-left: auto;
        margin-right: auto;
      }
      .guide-table th,
      .guide-table td {
        display: block;
        width: 100%;
      }
      .cart-added {
        align-items: flex-start;
        padding: 78px 14px 20px;
      }
      .cart-added-box { padding: 26px 24px 30px; }
      .cart-added-product {
        grid-template-columns: 76px 1fr;
        gap: 14px;
      }
      .cart-added-product img {
        width: 76px;
        height: 76px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/">ELIN</a>
      <nav>
        <a href="/login.html" id="loginLink">로그인</a>
        <a href="/mypage.html" id="memberLink">마이페이지</a>
        <a href="#" id="logoutLink" style="display:none">로그아웃</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="crumb">ELIN / 상품상세</div>
    <div id="productRoot" class="empty">상품을 불러오는 중입니다.</div>
  </main>

  <div class="cart-added" id="cartAdded" aria-hidden="true">
    <div class="cart-added-box" role="dialog" aria-label="카트에 추가된 품목">
      <button class="cart-added-close" type="button" id="cartAddedClose" aria-label="닫기">×</button>
      <div class="cart-added-title"><span>✓</span><span>카트에 추가된 품목</span></div>
      <div class="cart-added-product" id="cartAddedProduct"></div>
      <div class="cart-added-actions">
        <a id="cartAddedView" href="/?cart=open">카트 보기(0)</a>
        <a class="checkout-now" href="/checkout.html">결제</a>
        <button class="continue" type="button" id="cartAddedContinue">쇼핑 계속하기</button>
      </div>
    </div>
  </div>

  <script>
    const money = value => Number(value || 0).toLocaleString("ko-KR") + "원";
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    let product;
    let allProducts = [];
    let currentMember = null;

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, match => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[match]));
    }

    function parseImages(item) {
      if (Array.isArray(item.images)) return item.images.filter(Boolean).slice(0, 10);
      if (item.images) {
        try {
          const parsed = JSON.parse(item.images);
          if (Array.isArray(parsed)) return parsed.filter(Boolean).slice(0, 10);
        } catch (_) {}
      }
      return [item.image].filter(Boolean);
    }

    function parseOptions(value, fallback) {
      if (Array.isArray(value)) return value.map(item => String(item || "").trim()).filter(Boolean).slice(0, 30);
      if (value) {
        try {
          const parsed = JSON.parse(value);
          if (Array.isArray(parsed)) return parsed.map(item => String(item || "").trim()).filter(Boolean).slice(0, 30);
        } catch (_) {}
      }
      const options = String(value || "")
        .split(/[\n,]+/)
        .map(item => item.trim())
        .filter(Boolean)
        .slice(0, 30);
      return options.length ? options : [fallback];
    }

    function optionTags(options) {
      return options.map(option => `<option>${escapeHtml(option)}</option>`).join("");
    }

    function showImage(index) {
      const images = parseImages(product);
      document.querySelector("#mainImage").src = images[index] || product.image;
      document.querySelectorAll(".thumbs button").forEach((button, buttonIndex) => {
        button.classList.toggle("active", buttonIndex === index);
      });
    }

    function updateTotal() {
      const qty = Math.max(1, Number(document.querySelector("#qty")?.value || 1));
      const total = Number(product?.price || 0) * qty;
      const target = document.querySelector("#totalPrice");
      if (target) target.textContent = money(total);
    }

    async function load() {
      allProducts = await (await fetch("/api/products")).json();
      product = allProducts.find(item => item.id === id);
      if (!product) {
        document.querySelector("#productRoot").textContent = "상품을 찾을 수 없습니다.";
        return;
      }
      document.title = `ELIN | ${product.name}`;
      renderProduct();
    }

    function renderProduct() {
      const images = parseImages(product);
      const colors = parseOptions(product.colors, "기본");
      const sizes = parseOptions(product.sizes, "FREE");
      const title = escapeHtml(product.name);
      const related = allProducts
        .filter(item => item.id !== product.id && item.category === product.category)
        .slice(0, 4);

      document.querySelector("#productRoot").className = "";
      document.querySelector("#productRoot").innerHTML = `
        <section class="product-layout">
          <div class="gallery">
            <div class="thumbs">
              ${images.map((image, index) => `
                <button type="button" class="${index === 0 ? "active" : ""}" onclick="showImage(${index})" aria-label="상품 이미지 ${index + 1}">
                  <img src="${image}" alt="${title} 썸네일 ${index + 1}">
                </button>
              `).join("")}
            </div>
            <div class="main-image">
              <img id="mainImage" src="${images[0] || product.image}" alt="${title}">
            </div>
          </div>

          <aside class="buy-panel">
            <span class="label">${escapeHtml(product.label || "NEW")}</span>
            <h1>${title}</h1>
            <div class="sub">ELIN SELECT · 무통장입금 주문 가능</div>
            <div class="price">
              <span>${money(product.price)}</span>
            </div>

            <div class="info-table">
              <div class="info-row"><strong>배송비</strong><span>기본 3,000원 / 100,000원 이상 무료배송</span></div>
              <div class="info-row"><strong>결제</strong><span>무통장 입금 확인 후 순차 출고</span></div>
              <div class="info-row"><strong>문의</strong><span>주문 전 상품 상태와 옵션을 확인해주세요.</span></div>
            </div>

            <label for="color">색상</label>
            <select id="color">
              ${optionTags(colors)}
            </select>

            <label for="size">사이즈</label>
            <select id="size">
              ${optionTags(sizes)}
            </select>

            <div class="qty-row">
              <label for="qty">수량</label>
              <input id="qty" type="number" min="1" value="1" oninput="updateTotal()">
            </div>

            <div class="total">
              <span>총 상품금액</span>
              <strong id="totalPrice">${money(product.price)}</strong>
            </div>

            <div class="actions">
              <button type="button" class="action secondary" onclick="addToCart(false)">장바구니</button>
              <button type="button" class="action" onclick="addToCart(true)">바로 주문</button>
            </div>

            <div class="accordion">
              <details open>
                <summary>구매 전 안내</summary>
                <p>상품 이미지는 모니터 환경에 따라 색상이 다르게 보일 수 있습니다. 주문 전 옵션과 배송지를 꼭 확인해주세요.</p>
              </details>
              <details>
                <summary>배송 안내</summary>
                <p>입금 확인 후 영업일 기준 1~3일 내 순차 출고됩니다.</p>
              </details>
              <details>
                <summary>교환/반품 안내</summary>
                <p>상품 수령 후 7일 이내 고객센터로 접수해주세요. 사용 흔적이 있거나 구성품이 누락된 경우 제한될 수 있습니다.</p>
              </details>
            </div>
          </aside>
        </section>

        <section class="section">
          <h2>상품 상세정보</h2>
          <div class="detail-copy">
            ELIN에서 선별한 상품입니다. 전체 실루엣, 소재감, 디테일을 확인하실 수 있도록 등록된 이미지를 아래에 한 번 더 정리했습니다.
          </div>
          <div class="detail-images">
            ${images.map((image, index) => `
              <figure><img src="${image}" alt="${title} 상세 이미지 ${index + 1}"></figure>
            `).join("")}
          </div>
        </section>

        <section class="section">
          <h2>배송 및 교환 안내</h2>
          <table class="guide-table">
            <tr><th>결제 방식</th><td>현재 ELIN은 무통장 입금 방식으로 주문을 받습니다. 주문 후 안내된 계좌로 입금해 주세요.</td></tr>
            <tr><th>배송 기간</th><td>입금 확인 후 영업일 기준 1~3일 내 출고됩니다. 도서산간 지역은 추가 시간이 소요될 수 있습니다.</td></tr>
            <tr><th>교환/반품</th><td>상품 수령 후 7일 이내 접수 가능합니다. 착용, 세탁, 훼손, 구성품 누락 시 처리가 어려울 수 있습니다.</td></tr>
            <tr><th>고객센터</th><td>주문조회 또는 고객센터 메뉴를 통해 문의를 남겨주세요.</td></tr>
          </table>
        </section>

        ${related.length ? `
          <section class="section">
            <h2>함께 보면 좋은 상품</h2>
            <div class="related-grid">
              ${related.map(item => `
                <a class="related" href="/product.html?id=${encodeURIComponent(item.id)}">
                  <img src="${parseImages(item)[0] || item.image}" alt="${escapeHtml(item.name)}">
                  <strong>${escapeHtml(item.name)}</strong>
                  <span>${money(item.price)}</span>
                </a>
              `).join("")}
            </div>
          </section>
        ` : ""}
      `;
      document.querySelectorAll(".accordion details").forEach(detail => {
        detail.open = true;
        detail.addEventListener("toggle", () => {
          if (!detail.open) detail.open = true;
        });
      });
    }

    function requireMember() {
      if (currentMember) return true;
      alert("로그인 후 이용 가능합니다.");
      location.href = "/login.html";
      return false;
    }

    function addToCart(goCheckout) {
      if (!requireMember()) return;
      const cart = JSON.parse(localStorage.getItem("elinCart") || "[]");
      const color = document.querySelector("#color").value;
      const size = document.querySelector("#size").value;
      const qty = Math.max(1, Number(document.querySelector("#qty").value || 1));
      const existing = cart.find(item => item.id === product.id && item.color === color && item.size === size);
      if (existing) existing.qty += qty;
      else cart.push({ ...product, image: parseImages(product)[0] || product.image, qty, color, size });
      localStorage.setItem("elinCart", JSON.stringify(cart));
      if (goCheckout) location.href = "/checkout.html";
      else showCartAdded({ ...product, image: parseImages(product)[0] || product.image, qty, color, size }, cart);
    }

    function showCartAdded(item, cart) {
      const totalQty = cart.reduce((sum, cartItem) => sum + Number(cartItem.qty || 0), 0);
      document.querySelector("#cartAddedProduct").innerHTML = `
        <img src="${item.image}" alt="${item.name}">
        <div>
          <strong>${item.name}</strong>
          <span>${item.category || "상품"} · ${item.color || "기본"} / ${item.size || "FREE"}</span>
        </div>
      `;
      document.querySelector("#cartAddedView").textContent = `카트 보기(${totalQty})`;
      document.querySelector("#cartAdded").classList.add("open");
      document.querySelector("#cartAdded").setAttribute("aria-hidden", "false");
    }

    function closeCartAdded() {
      document.querySelector("#cartAdded").classList.remove("open");
      document.querySelector("#cartAdded").setAttribute("aria-hidden", "true");
    }

    async function loadMemberNav() {
      const response = await fetch("/api/auth/me");
      if (!response.ok) return;
      const result = await response.json();
      if (!result.member) return;
      currentMember = result.member;
      document.querySelector("#loginLink").style.display = "none";
      document.querySelector("#memberLink").textContent = `${result.member.name}님`;
      document.querySelector("#logoutLink").style.display = "";
    }

    document.querySelector("#logoutLink").addEventListener("click", async event => {
      event.preventDefault();
      await fetch("/api/auth/logout", { method: "POST" });
      location.href = "/";
    });
    document.querySelector("#cartAddedClose").addEventListener("click", closeCartAdded);
    document.querySelector("#cartAddedContinue").addEventListener("click", closeCartAdded);
    document.querySelector("#cartAdded").addEventListener("click", event => {
      if (event.target.id === "cartAdded") closeCartAdded();
    });

    load();
    loadMemberNav();
  </script>
</body>
</html>
