<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 상품상세</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #fbfaf8;
      color: #171717;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    header { border-bottom: 1px solid #e6e0d8; background: #fff; }
    .bar {
      max-width: 1220px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0;
    }
    nav { display: flex; align-items: center; gap: 14px; color: #555; font-size: 14px; }
    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 20px 70px;
    }
    .crumb {
      margin-bottom: 22px;
      color: #777;
      font-size: 13px;
    }
    .product-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 410px;
      gap: 42px;
      align-items: start;
    }
    .gallery {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .thumbs {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 130px);
      overflow: auto;
      padding-right: 2px;
    }
    .thumbs button {
      width: 86px;
      aspect-ratio: 1 / 1;
      padding: 0;
      border: 1px solid #e1dbd2;
      border-radius: 4px;
      background: #f1eee8;
      overflow: hidden;
      cursor: pointer;
    }
    .thumbs button.active { border: 2px solid #171717; }
    .thumbs img,
    .main-image img,
    .detail-images img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #f1eee8;
      color: transparent;
      font-size: 0;
    }
    .main-image {
      background: #f1eee8;
      border-radius: 4px;
      overflow: hidden;
      min-height: 520px;
      display: grid;
      place-items: center;
    }
    .main-image img {
      height: auto;
      max-width: 100%;
      max-height: 760px;
      aspect-ratio: auto;
    }
    .buy-panel {
      position: sticky;
      top: 18px;
      background: #fff;
      border: 1px solid #e6e0d8;
      border-radius: 6px;
      padding: 24px;
    }
    .label {
      display: inline-block;
      margin-bottom: 12px;
      color: #b71f2a;
      font-size: 12px;
      font-weight: 900;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 25px;
      line-height: 1.35;
      word-break: keep-all;
    }
    .sub {
      margin-bottom: 18px;
      color: #777;
      font-size: 13px;
      line-height: 1.7;
    }
    .price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 18px 0;
      border-top: 1px solid #eee8df;
      border-bottom: 1px solid #eee8df;
      font-size: 24px;
      font-weight: 900;
    }
    .price del { color: #aaa; font-size: 14px; font-weight: 500; }
    .info-table {
      margin: 18px 0;
      display: grid;
      gap: 10px;
      color: #555;
      font-size: 13px;
    }
    .info-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
    }
    .info-row strong { color: #171717; }
    label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 800;
      font-size: 14px;
    }
    select, input {
      width: 100%;
      border: 1px solid #ddd5cb;
      border-radius: 4px;
      padding: 13px;
      background: #fff;
    }
    .qty-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 8px;
      align-items: end;
    }
    .total {
      margin-top: 18px;
      padding: 16px 0 0;
      border-top: 1px solid #eee8df;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 900;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 18px;
    }
    button.action {
      height: 50px;
      border: 0;
      border-radius: 4px;
      background: #171717;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    button.secondary {
      background: #f3f0ea;
      color: #171717;
      border: 1px solid #e1dbd2;
    }
    .accordion {
      margin-top: 20px;
      border-top: 1px solid #eee8df;
    }
    details {
      border-bottom: 1px solid #eee8df;
      padding: 14px 0;
    }
    summary {
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    details p {
      margin: 12px 0 0;
      color: #666;
      line-height: 1.8;
      font-size: 13px;
    }
    .section {
      margin-top: 58px;
      border-top: 1px solid #171717;
      padding-top: 24px;
      text-align: center;
    }
    .section h2 {
      margin: 0 0 18px;
      font-size: 18px;
      text-align: center;
    }
    .detail-copy {
      max-width: 720px;
      margin: 0 auto;
      color: #555;
      line-height: 1.9;
      word-break: keep-all;
      text-align: center;
    }
    .product-description {
      margin-top: 16px;
      color: #333;
    }
    .detail-images {
      margin: 22px auto 0;
      display: grid;
      gap: 14px;
      max-width: 760px;
      justify-items: center;
    }
    .detail-images figure {
      margin: 0;
      width: 100%;
      max-width: 720px;
      background: #f1eee8;
      border-radius: 4px;
      overflow: hidden;
      display: grid;
      place-items: center;
    }
    .detail-images img {
      height: auto;
      aspect-ratio: auto;
      max-width: 100%;
    }
    .guide-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e6e0d8;
      font-size: 14px;
    }
    .guide-table th,
    .guide-table td {
      border-bottom: 1px solid #eee8df;
      padding: 14px;
      text-align: left;
      vertical-align: top;
      line-height: 1.7;
    }
    .guide-table th {
      width: 170px;
      background: #f5f1eb;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }
    .related-section {
      display: block;
    }
    .related-section h2 {
      text-align: center;
    }
    .related-empty {
      grid-column: 1 / -1;
      padding: 28px 0;
      color: #777;
      text-align: center;
      border: 1px solid #eee8df;
      background: #fff;
    }
    .related {
      display: block;
      min-width: 0;
    }
    .related-media {
      width: 100%;
      aspect-ratio: 1 / 1.2;
      display: block;
      overflow: hidden;
      background: #f1eee8;
      border-radius: 4px;
    }
    .related-media img,
    .related > img {
      width: 100%;
      height: 100%;
      display: block;
      aspect-ratio: 1 / 1.2;
      object-fit: cover;
      object-position: center;
      background: #f1eee8;
    }
    .related strong {
      display: block;
      margin-top: 9px;
      font-size: 14px;
      line-height: 1.4;
    }
    .related span {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 800;
    }
    .product-reviews {
      text-align: left;
      display: none !important;
    }
    .review-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .review-head h2 {
      margin: 0;
      text-align: left;
      font-size: 22px;
    }
    .review-head span {
      color: #777;
      font-size: 14px;
    }
    .review-login-box,
    .review-form,
    .review-card {
      background: #fff;
      border: 1px solid #e6e0d8;
      border-radius: 6px;
      padding: 18px;
    }
    .review-login-box {
      text-align: center;
      color: #555;
    }
    .review-login-box a {
      display: inline-block;
      margin-left: 8px;
      font-weight: 900;
      text-decoration: underline;
    }
    .review-form {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }
    .review-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px;
    }
    .review-form textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid #ddd5cb;
      border-radius: 4px;
      padding: 13px;
      resize: vertical;
      font: inherit;
      background: #fff;
    }
    .review-form button {
      justify-self: start;
      min-width: 130px;
      height: 46px;
      border: 0;
      border-radius: 4px;
      background: #171717;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    .review-message {
      color: #777;
      font-size: 13px;
      line-height: 1.5;
    }
    .review-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .review-preview img,
    .review-card-images img {
      width: 86px;
      height: 86px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e6e0d8;
      background: #f3f0ea;
      color: transparent;
      font-size: 0;
    }
    .review-list {
      display: grid;
      gap: 12px;
    }
    .review-card {
      display: grid;
      gap: 10px;
    }
    .review-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #777;
      font-size: 13px;
    }
    .review-stars {
      color: #171717;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .review-card-content {
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .review-card-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .review-empty {
      padding: 28px;
      text-align: center;
      color: #777;
      background: #fff;
      border: 1px solid #e6e0d8;
      border-radius: 6px;
    }
    .empty {
      display: none;
      padding: 80px 20px;
      text-align: center;
      background: #fff;
      border: 1px solid #e6e0d8;
      border-radius: 6px;
    }
    .cart-added {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,.12);
    }
    .cart-added.open { display: flex; }
    .cart-added-box {
      width: min(460px, 100%);
      background: #fff;
      border: 1px solid #e6e0d8;
      box-shadow: 0 24px 70px rgba(0,0,0,.12);
      padding: 28px 34px 34px;
      position: relative;
    }
    .cart-added-close {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #171717;
      font-size: 34px;
      line-height: 1;
    }
    .cart-added-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
      font-weight: 800;
      font-size: 18px;
    }
    .cart-added-product {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 18px;
      align-items: center;
      margin-bottom: 28px;
    }
    .cart-added-product img {
      width: 88px;
      height: 88px;
      object-fit: contain;
      border: 1px solid #e6e0d8;
      background: #f3f0ea;
      color: transparent;
      font-size: 0;
    }
    .cart-added-product strong {
      display: block;
      margin-bottom: 8px;
      font-size: 17px;
      line-height: 1.35;
      word-break: keep-all;
    }
    .cart-added-product span {
      display: block;
      color: #666;
      line-height: 1.55;
    }
    .cart-added-actions {
      display: grid;
      gap: 11px;
    }
    .cart-added-actions button,
    .cart-added-actions a {
      display: grid;
      place-items: center;
      min-height: 58px;
      border: 1px solid #171717;
      background: #fff;
      color: #171717;
      font-weight: 900;
      text-align: center;
      cursor: pointer;
    }
    .cart-added-actions .checkout-now {
      background: #171717;
      color: #fff;
    }
    .cart-added-actions .continue {
      min-height: 34px;
      border: 0;
      text-decoration: underline;
      background: transparent;
      font-weight: 500;
    }
    @media (max-width: 920px) {
      .product-layout { grid-template-columns: 1fr; gap: 24px; }
      .buy-panel { position: static; }
      .gallery { grid-template-columns: 1fr; }
      .thumbs {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        grid-auto-flow: column;
        overflow-x: auto;
        max-height: none;
        order: 2;
      }
      .thumbs button { width: 100%; }
      .main-image { min-height: 0; }
      .related-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .review-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      .bar { align-items: flex-start; flex-direction: column; }
      .brand { font-size: 30px; }
      .page { padding: 18px 14px 50px; }
      .buy-panel { padding: 18px; }
      .actions { grid-template-columns: 1fr; }
      .qty-row { grid-template-columns: 1fr; }
      .thumbs {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        grid-auto-flow: row;
        overflow: visible;
        gap: 8px;
      }
      .thumbs button {
        width: 100%;
      }
      .section {
        width: 100%;
        margin-left: auto;
        margin-right: auto;
        text-align: center;
      }
      .section h2 {
        text-align: center;
      }
      .detail-copy {
        width: 100%;
        max-width: 360px;
        margin-left: auto;
        margin-right: auto;
        text-align: center;
      }
      .detail-images {
        width: 100%;
        max-width: 430px;
        margin-left: auto;
        margin-right: auto;
        justify-items: center;
      }
      .detail-images figure {
        width: 100%;
        max-width: 430px;
        margin-left: auto;
        margin-right: auto;
      }
      .related-section {
        margin-top: 34px;
        padding-bottom: 22px;
        text-align: left;
      }
      .related-section h2 {
        text-align: left;
        font-size: 26px;
      }
      .related-grid {
        gap: 18px 12px;
      }
      .guide-table th,
      .guide-table td {
        display: block;
        width: 100%;
      }
      .cart-added {
        align-items: flex-start;
        padding: 78px 14px 20px;
      }
      .cart-added-box { padding: 26px 24px 30px; }
      .cart-added-product {
        grid-template-columns: 76px 1fr;
        gap: 14px;
      }
      .cart-added-product img {
        width: 76px;
        height: 76px;
      }
    }
  </style>
  <link rel="stylesheet" href="/talk-widget.css" />
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/">ELIN</a>
      <nav>
        <a href="/login.html" id="loginLink">로그인</a>
        <a href="/mypage.html" id="memberLink">마이페이지</a>
        <a href="#" id="logoutLink" style="display:none">로그아웃</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="crumb">ELIN / 상품상세</div>
    <div id="productRoot" class="empty">상품을 불러오는 중입니다.</div>
  </main>

  <div class="cart-added" id="cartAdded" aria-hidden="true">
    <div class="cart-added-box" role="dialog" aria-label="장바구니에 추가됨">
      <button class="cart-added-close" type="button" id="cartAddedClose" aria-label="닫기">×</button>
      <div class="cart-added-title"><span>✓</span><span>장바구니에 추가되었습니다</span></div>
      <div class="cart-added-product" id="cartAddedProduct"></div>
      <div class="cart-added-actions">
        <a id="cartAddedView" href="/?cart=open">장바구니 보기(0)</a>
        <a class="checkout-now" href="/checkout.html">주문하기</a>
        <button class="continue" type="button" id="cartAddedContinue">쇼핑 계속하기</button>
      </div>
    </div>
  </div>

  <script>
    const money = value => Number(value || 0).toLocaleString("ko-KR") + "원";
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    let product;
    let allProducts = [];
    let currentMember = null;
    let siteSettings = {};
    let productReviews = [];
    let reviewImages = [];
    const productCacheKey = "elinProductSummaryCacheV7";
    const relatedProductsCacheKey = "elinProductSummariesV6";
    try { localStorage.removeItem("elinProductSummaryCacheV2"); } catch (_) {}
    try { localStorage.removeItem("elinProductSummaryCacheV3"); } catch (_) {}
    try { localStorage.removeItem("elinProductSummaryCacheV4"); } catch (_) {}
    try { localStorage.removeItem("elinProductSummaryCacheV5"); } catch (_) {}
    try { localStorage.removeItem("elinProductSummaryCacheV6"); } catch (_) {}
    try { sessionStorage.removeItem("elinProductSummaries"); } catch (_) {}
    try { sessionStorage.removeItem("elinProductSummariesV3"); } catch (_) {}
    try { sessionStorage.removeItem("elinProductSummariesV4"); } catch (_) {}
    try { sessionStorage.removeItem("elinProductSummariesV5"); } catch (_) {}

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, match => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[match]));
    }

    function parseImages(item) {
      if (Array.isArray(item.images)) return item.images.filter(Boolean).slice(0, 15);
      if (item.images) {
        try {
          const parsed = JSON.parse(item.images);
          if (Array.isArray(parsed)) return parsed.filter(Boolean).slice(0, 15);
        } catch (_) {}
      }
      return [item.image].filter(Boolean);
    }

    function parseOptions(value, fallback) {
      if (Array.isArray(value)) return value.map(item => String(item || "").trim()).filter(Boolean).slice(0, 30);
      if (value) {
        try {
          const parsed = JSON.parse(value);
          if (Array.isArray(parsed)) return parsed.map(item => String(item || "").trim()).filter(Boolean).slice(0, 30);
        } catch (_) {}
      }
      const options = String(value || "")
        .split(/[\n,]+/)
        .map(item => item.trim())
        .filter(Boolean)
        .slice(0, 30);
      return options.length ? options : [fallback];
    }

    function optionTags(options) {
      return options.map(option => `<option>${escapeHtml(option)}</option>`).join("");
    }

    function categoryGroup(category) {
      const value = String(category || "");
      if (value.startsWith("men-")) return "men";
      if (value.startsWith("women-")) return "women";
      if (value.startsWith("bag-")) return "bag";
      if (value.startsWith("shoes-")) return "shoes";
      if (value.startsWith("golf-")) return "golf";
      if (value.startsWith("accessory-")) return "accessory";
      if (value.startsWith("watch-")) return "watch";
      return value;
    }

    function keywordTokens(item) {
      return String([item?.keywords, item?.name, item?.category].filter(Boolean).join(" "))
        .toLowerCase()
        .split(/[^0-9a-z가-힣]+/i)
        .map(token => token.trim())
        .filter(token => token.length >= 2);
    }

    function relatedScore(item, currentTokens, currentGroup) {
      const tokens = new Set(keywordTokens(item));
      const keywordMatches = currentTokens.reduce((count, token) => count + (tokens.has(token) ? 1 : 0), 0);
      const sameCategory = categoryGroup(item.category) === currentGroup ? 1 : 0;
      return keywordMatches * 20 + sameCategory;
    }

    function lineHtml(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");
    }

    function cleanDisplayText(value, fallback = "") {
      const text = String(value || "").replace(/\uFFFD|\?{2,}/g, "").trim();
      return text || fallback;
    }

    function productGuide() {
      return {
        purchaseTitle: siteSettings.productGuidePurchaseTitle || "구매 전 안내",
        purchaseText: siteSettings.productGuidePurchaseText || "상품 이미지는 모니터 환경에 따라 색상이 다르게 보일 수 있습니다.\n주문 전 옵션과 배송지를 꼭 확인해주세요.",
        shippingTitle: siteSettings.productGuideShippingTitle || "배송 안내",
        shippingText: siteSettings.productGuideShippingText || "입금 확인 후 영업일 기준 1~3일 내 순차 출고됩니다.",
        returnTitle: siteSettings.productGuideReturnTitle || "교환/반품 안내",
        returnText: siteSettings.productGuideReturnText || "상품 수령 후 7일 이내 고객센터로 접수해주세요. 사용 흔적이 있거나 구성품이 누락된 경우 제한될 수 있습니다.",
        exchangeTitle: siteSettings.productExchangeTitle || "배송 및 교환 안내",
        exchangeRows: Array.isArray(siteSettings.productExchangeRows) ? siteSettings.productExchangeRows : [
          { label: "결제 방식", text: "현재 ELIN은 무통장 입금 방식으로 주문을 받습니다. 주문 후 안내된 계좌로 입금해 주세요." },

        { label: "문의", text: "주문 전 상품 상태와 옵션을 확인해주세요." }

      const rows = Array.isArray(siteSettings.productInfoRows) ? siteSettings.productInfoRows : defaults;
      return defaults.map((fallback, index) => {
        const row = rows[index] || fallback;
        const label = String(row.label || fallback.label || "").trim();
        const text = String(row.text || fallback.text || "").trim();

      const qty = Math.max(1, Number(document.querySelector("#qty")?.value || 1));

      if (target) target.textContent = money(total);

    function formatDate(value) {
      if (!value) return "";
      return new Date(value).toLocaleString("ko-KR", {
        year: "numeric",
        month: "numeric",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function reviewStars(rating) {
      const count = Math.max(1, Math.min(5, Number(rating || 5)));
      return "★★★★★".slice(0, count) + "☆☆☆☆☆".slice(0, 5 - count);
    }

    function parseReviewImages(review) {
      if (Array.isArray(review.images)) return review.images.filter(Boolean).slice(0, 5);
      if (review.images) {
        try {
          const parsed = JSON.parse(review.images);
          if (Array.isArray(parsed)) return parsed.filter(Boolean).slice(0, 5);
        } catch (_) {}
      }
      return [review.image].filter(Boolean);
    }

    function reviewMatchesProduct(review) {
      return String(review.productId || review.product_id || "") === String(product.id)
        || String(review.productName || review.product_name || "") === String(product.name);

    function reviewCard(review) {
      const images = parseReviewImages(review);
      return `
        <article class="review-card">
          <div class="review-card-head">
            <strong>${escapeHtml(review.username || review.name || "member")}</strong>
            <span>${formatDate(review.createdAt || review.created_at)}</span>
          </div>
          <div class="review-stars">${reviewStars(review.rating)}</div>
          <div class="review-card-content">${escapeHtml(review.content || "")}</div>
          ${images.length ? `<div class="review-card-images">${images.map((image, index) => `<img src="${escapeHtml(image)}" alt="후기 이미지 ${index + 1}" loading="lazy" decoding="async">`).join("")}</div>` : ""}
        </article>
      `;
    }

    function dataUrlBytes(dataUrl) {
      const base64 = String(dataUrl || "").split(",")[1] || "";
      return Math.ceil(base64.length * 0.75);
    }

    function compressReviewImage(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        const objectUrl = URL.createObjectURL(file);
        image.onload = () => {
          try {
            let maxSize = 900;
            let quality = 0.74;
            const targetBytes = 180_000;
            const minQuality = 0.42;
            let result = "";
            for (let attempt = 0; attempt < 12; attempt += 1) {
              const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
              const canvas = document.createElement("canvas");
              canvas.width = Math.max(1, Math.round(image.width * scale));
              canvas.height = Math.max(1, Math.round(image.height * scale));
              const context = canvas.getContext("2d");
              context.fillStyle = "#fff";
              context.fillRect(0, 0, canvas.width, canvas.height);
              context.drawImage(image, 0, 0, canvas.width, canvas.height);
              result = canvas.toDataURL("image/jpeg", quality);
              if (dataUrlBytes(result) <= targetBytes) break;
              if (quality > minQuality) quality = Math.max(minQuality, quality - 0.1);
              else maxSize = Math.max(560, Math.round(maxSize * 0.82));
            }
            URL.revokeObjectURL(objectUrl);
            resolve(result);
          } catch (error) {
            URL.revokeObjectURL(objectUrl);
            reject(error);
          }
        };
        image.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          reject(new Error("이미지를 읽지 못했습니다."));
        };
        image.src = objectUrl;
      });
    }

    async function loadProductReviews() {
      try {
        const response = await fetch("/api/reviews");
        if (!response.ok) return;
        const reviews = await response.json();
        productReviews = reviews.filter(reviewMatchesProduct);
        renderProductReviews();
      } catch (_) {}
    }

    async function load() {
      const [productResponse, settingsResponse, memberResponse] = await Promise.all([
        fetch(`/api/products/${encodeURIComponent(id)}`),
        fetch("/api/site-settings"),
        fetch("/api/auth/me")
      ]);
      if (!productResponse.ok) {
        document.querySelector("#productRoot").textContent = "상품을 찾을 수 없습니다.";
        return;
      }
      product = await productResponse.json();
      if (settingsResponse.ok) siteSettings = await settingsResponse.json();
      if (memberResponse.ok) {
        const memberData = await memberResponse.json();
        currentMember = memberData.member || null;
      }
      if (!product) {
        document.querySelector("#productRoot").textContent = "상품을 찾을 수 없습니다.";
        return;
      }
      document.title = `ELIN | ${product.name}`;
      renderProduct();
      loadRelatedProducts();
    }

    async function loadRelatedProducts() {
      try {
        const cached = sessionStorage.getItem(relatedProductsCacheKey);
        if (cached) {
          allProducts = JSON.parse(cached);
          if (Array.isArray(allProducts) && allProducts.length > 1) renderRelatedProducts();
        }
        const response = await fetch("/api/products?summary=1");
        if (!response.ok) return;
        allProducts = await response.json();
        sessionStorage.setItem(relatedProductsCacheKey, JSON.stringify(allProducts));
        renderRelatedProducts();
      } catch (_) {}
    }

    function relatedProducts(limit = 4) {
      if (!product || !Array.isArray(allProducts)) return [];
      const currentId = String(product.id);
      const currentGroup = categoryGroup(product.category);
      const currentTokens = keywordTokens(product);
      const candidates = allProducts.filter(item => String(item.id) !== currentId);
      return candidates
        .map((item, index) => ({ item, index, score: relatedScore(item, currentTokens, currentGroup) }))
        .sort((a, b) => b.score - a.score || a.index - b.index)
        .slice(0, limit)
        .map(entry => entry.item);
    }

    function renderRelatedProducts() {
      let section = document.querySelector("#relatedProductsSection");
      let grid = document.querySelector("#relatedProductsGrid");
      if (!product) return;
      if (!section || !grid) {
        const existingGrid = Array.from(document.querySelectorAll(".related-grid")).find(item => !item.id);
        if (existingGrid) {
          grid = existingGrid;
          grid.id = "relatedProductsGrid";
          section = existingGrid.closest(".section");
          if (section) section.id = "relatedProductsSection";
        }
      }
      if (!section || !grid) {
        section = document.createElement("section");
        section.className = "section";
        section.id = "relatedProductsSection";
        section.style.display = "none";
        section.innerHTML = `<h2>함께 보면 좋은 상품</h2><div class="related-grid" id="relatedProductsGrid"></div>`;
        document.querySelector("#productRoot").appendChild(section);
        grid = document.querySelector("#relatedProductsGrid");
      }
      const related = relatedProducts();
      if (!related.length) {
        section.style.display = "none";
        grid.innerHTML = "";
        return;
      }
      section.style.display = "";
      grid.innerHTML = related.map(item => `
        <a class="related" href="/product.html?id=${encodeURIComponent(item.id)}">
          <img src="${parseImages(item)[0] || item.image}" alt="${escapeHtml(item.name)}" loading="lazy">
          <strong>${escapeHtml(item.name)}</strong>
          <span>${money(item.price)}</span>
        </a>
      `).join("");
    }

    function renderRelatedProducts() {
      let section = document.querySelector("#relatedProductsSection");
      let grid = document.querySelector("#relatedProductsGrid");
      if (!product) return;
      if (!section || !grid) {
        section = document.createElement("section");
        section.className = "section related-section";
        section.id = "relatedProductsSection";
        section.innerHTML = `<h2>함께 보면 좋은 상품</h2><div class="related-grid" id="relatedProductsGrid"></div>`;
        const reviews = document.querySelector("#productReviews");
        if (reviews) {
          reviews.insertAdjacentElement("beforebegin", section);
        } else {
          document.querySelector("#productRoot").appendChild(section);
        }
        grid = document.querySelector("#relatedProductsGrid");
      }
      section.classList.add("related-section");
      const title = section.querySelector("h2");
      if (title) title.textContent = "함께 보면 좋은 상품";
      document.querySelectorAll(".related-grid:not(#relatedProductsGrid)").forEach(extraGrid => {
        const extraSection = extraGrid.closest(".section");
        if (extraSection) extraSection.remove();
      });
      const related = relatedProducts();
      section.style.display = "";
      grid.innerHTML = related.length
        ? related.map(item => `
          <a class="related" href="/product.html?id=${encodeURIComponent(item.id)}">
            <span class="related-media"><img src="${parseImages(item)[0] || item.image}" alt="${escapeHtml(item.name)}" loading="lazy" decoding="async"></span>
            <strong>${escapeHtml(item.name)}</strong>

      const list = document.querySelector("#productReviewList");

      count.textContent = `${productReviews.length}개`;
      list.innerHTML = productReviews.length

    function bindProductReviewForm() {
      const form = document.querySelector("#productReviewForm");
      const fileInput = document.querySelector("#reviewImages");
      const preview = document.querySelector("#reviewPreview");
      const message = document.querySelector("#reviewMessage");
      if (!form) return;

      fileInput?.addEventListener("change", async () => {
        const files = Array.from(fileInput.files || []).slice(0, 5);
        if (!files.length) return;
        message.textContent = "이미지를 줄이는 중입니다...";
        try {
          const compressed = await Promise.all(files.map(compressReviewImage));
          reviewImages = reviewImages.concat(compressed).slice(0, 5);
          preview.innerHTML = reviewImages.map((image, index) => `<img src="${image}" alt="후기 이미지 ${index + 1}">`).join("");
          message.textContent = "이미지가 첨부되었습니다.";
        } catch (error) {
          message.textContent = error.message || "이미지 첨부에 실패했습니다.";
        }
        fileInput.value = "";
      });

      form.addEventListener("submit", async event => {
        event.preventDefault();
        if (!currentMember) {
          location.href = "/login.html";
          return;
        }
        const content = document.querySelector("#reviewContent").value.trim();
        if (!content) {
          message.textContent = "후기 내용을 입력해주세요.";
          return;
        }
        message.textContent = "후기를 등록하는 중입니다...";
        const response = await fetch("/api/reviews", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            productId: product.id,
            productName: product.name,
            rating: document.querySelector("#reviewRating").value,
            content,
            images: reviewImages,
            image: reviewImages[0] || ""
          })
        });
        const data = await response.json();
        if (!response.ok) {
          message.textContent = data.error || "후기 등록에 실패했습니다.";
          return;
        }
        productReviews.unshift(data);
        reviewImages = [];
        form.reset();
        preview.innerHTML = "";
        message.textContent = "후기가 등록되었습니다.";
        renderProductReviews();
      });
    }

    function renderCachedProductFirst() {
      return false;
      try {
        const cached = JSON.parse(localStorage.getItem(productCacheKey) || "{}");
        if (!Array.isArray(cached.products) || !cached.products.length) return false;
        const cachedProduct = cached.products.find(item => String(item.id) === String(id));

        product = cachedProduct;
        allProducts = cached.products;

        renderRelatedProducts();

    function requireMember() {
      if (currentMember) return true;
      alert("로그인 후 이용 가능합니다.");
      location.href = "/login.html";
      return false;
    }

    function addToCart(goCheckout) {
      if (!requireMember()) return;
      const cart = JSON.parse(localStorage.getItem("elinCart") || "[]");
      const color = document.querySelector("#color").value;
      const size = document.querySelector("#size").value;
      const qty = Math.max(1, Number(document.querySelector("#qty").value || 1));
      const existing = cart.find(item => item.id === product.id && item.color === color && item.size === size);
      if (existing) existing.qty += qty;
      else cart.push({ ...product, image: parseImages(product)[0] || product.image, qty, color, size });
      localStorage.setItem("elinCart", JSON.stringify(cart));
      if (goCheckout) location.href = "/checkout.html";
      else showCartAdded({ ...product, image: parseImages(product)[0] || product.image, qty, color, size }, cart);
    }

    function showCartAdded(item, cart) {
      const totalQty = cart.reduce((sum, cartItem) => sum + Number(cartItem.qty || 0), 0);
      document.querySelector("#cartAddedProduct").innerHTML = `
        <img src="${item.image}" alt="${item.name}" loading="lazy" decoding="async">
        <div>
          <strong>${item.name}</strong>
          <span>${item.category || "상품"} · ${item.color || "기본"} / ${item.size || "FREE"}</span>
        </div>
      `;
      document.querySelector("#cartAddedView").textContent = `장바구니 보기(${totalQty})`;
      document.querySelector("#cartAdded").classList.add("open");
      document.querySelector("#cartAdded").setAttribute("aria-hidden", "false");
    }

    function closeCartAdded() {
      document.querySelector("#cartAdded").classList.remove("open");
      document.querySelector("#cartAdded").setAttribute("aria-hidden", "true");
    }

    async function loadMemberNav() {
      const response = await fetch("/api/auth/me");
      if (!response.ok) return;
      const result = await response.json();
      if (!result.member) return;
      currentMember = result.member;
      document.querySelector("#loginLink").style.display = "none";
      document.querySelector("#memberLink").textContent = `${result.member.name}님`;
      document.querySelector("#logoutLink").style.display = "";
    }

    document.querySelector("#logoutLink").addEventListener("click", async event => {
      event.preventDefault();
      await fetch("/api/auth/logout", { method: "POST" });
      location.href = "/";
    });
    document.querySelector("#cartAddedClose").addEventListener("click", closeCartAdded);
    document.querySelector("#cartAddedContinue").addEventListener("click", closeCartAdded);
    document.querySelector("#cartAdded").addEventListener("click", event => {
      if (event.target.id === "cartAdded") closeCartAdded();
    });

    renderCachedProductFirst();
    load();
    loadMemberNav();
  </script>
  <script src="/talk-widget.js"></script>
</body>
</html>
