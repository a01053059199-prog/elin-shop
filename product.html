<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 상품상세</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fbfaf8; color: #171717; font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    header { border-bottom: 1px solid #e6e0d8; background: #fff; }
    .bar, main { max-width: 1180px; margin: 0 auto; padding: 20px; }
    .bar { display: flex; justify-content: space-between; align-items: center; }
    .brand { font-family: Georgia, "Times New Roman", serif; font-size: 34px; letter-spacing: .08em; font-weight: 700; }
    main { display: grid; grid-template-columns: minmax(0, 1fr) 430px; gap: 34px; align-items: start; }
    .media { background: #f3f0ea; border-radius: 8px; overflow: hidden; }
    .media img { width: 100%; aspect-ratio: 4 / 5; object-fit: cover; }
    .info { background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 24px; position: sticky; top: 18px; }
    .label { display: inline-block; color: #b71f2a; font-size: 12px; font-weight: 900; margin-bottom: 12px; }
    h1 { margin: 0 0 10px; font-size: 28px; line-height: 1.25; }
    .meta { color: #6a6a6a; line-height: 1.7; }
    .price { margin: 18px 0; font-size: 24px; font-weight: 900; }
    .price del { margin-left: 8px; color: #999; font-size: 14px; font-weight: 500; }
    label { display: block; margin: 14px 0 7px; font-weight: 800; font-size: 14px; }
    select, input { width: 100%; border: 1px solid #ddd5cb; border-radius: 6px; padding: 12px; background: #fff; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; }
    button { height: 48px; border: 0; border-radius: 4px; background: #171717; color: #fff; font-weight: 900; cursor: pointer; }
    .ghost { background: #f3f0ea; color: #171717; }
    .notice { margin-top: 22px; border-top: 1px solid #e6e0d8; padding-top: 18px; color: #555; line-height: 1.8; }
    @media (max-width: 850px) { main { grid-template-columns: 1fr; } .info { position: static; } }
  </style>
</head>
<body>
  <header><div class="bar"><a class="brand" href="/">ELIN</a><a href="/mypage.html">마이페이지</a></div></header>
  <main>
    <section class="media" id="media"></section>
    <section class="info" id="info">상품을 불러오는 중입니다.</section>
  </main>
  <script>
    const money = value => Number(value || 0).toLocaleString("ko-KR") + "원";
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    let product;

    async function load() {
      const products = await (await fetch("/api/products")).json();
      product = products.find(item => item.id === id);
      if (!product) {
        document.querySelector("#info").textContent = "상품을 찾을 수 없습니다.";
        return;
      }
      document.title = `ELIN | ${product.name}`;
      document.querySelector("#media").innerHTML = `<img src="${product.image}" alt="${product.name}">`;
      document.querySelector("#info").innerHTML = `
        <span class="label">${product.label || "NEW"}</span>
        <h1>${product.name}</h1>
        <div class="meta">ELIN SELECT · 재고 ${product.stock}개</div>
        <div class="price">${money(product.price)} <del>${money(product.old)}</del></div>
        <label for="color">색상</label>
        <select id="color"><option>기본</option><option>블랙</option><option>크림</option><option>브라운</option></select>
        <label for="size">사이즈</label>
        <select id="size"><option>FREE</option><option>S</option><option>M</option><option>L</option></select>
        <label for="qty">수량</label>
        <input id="qty" type="number" min="1" max="${product.stock}" value="1">
        <div class="actions">
          <button type="button" onclick="addToCart(false)">장바구니</button>
          <button type="button" class="ghost" onclick="addToCart(true)">바로 주문</button>
        </div>
        <div class="notice">
          배송은 결제 확인 후 순차 출고됩니다.<br>
          교환/반품은 수령 후 7일 이내 고객센터로 접수해주세요.
        </div>
      `;
    }

    function addToCart(goCheckout) {
      const cart = JSON.parse(localStorage.getItem("elinCart") || "[]");
      const color = document.querySelector("#color").value;
      const size = document.querySelector("#size").value;
      const qty = Math.max(1, Number(document.querySelector("#qty").value || 1));
      const existing = cart.find(item => item.id === product.id && item.color === color && item.size === size);
      if (existing) existing.qty += qty;
      else cart.push({ ...product, qty, color, size });
      localStorage.setItem("elinCart", JSON.stringify(cart));
      if (goCheckout) location.href = "/checkout.html";
      else alert("장바구니에 담았습니다.");
    }

    load();
  </script>
</body>
</html>
