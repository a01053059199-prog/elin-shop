<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 고객센터</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fbfaf8; color: #171717; font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    header { border-bottom: 1px solid #e6e0d8; background: #fff; }
    .bar, main { max-width: 1080px; margin: 0 auto; padding: 20px; }
    .bar { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .brand { font-family: Georgia, "Times New Roman", serif; font-size: 34px; letter-spacing: .08em; font-weight: 700; }
    .nav { display: flex; gap: 16px; color: #555; font-size: 14px; }
    h1 { margin: 28px 0 8px; font-size: 34px; }
    .lead { margin: 0 0 22px; color: #666; line-height: 1.7; }
    .grid { display: grid; grid-template-columns: .9fr 1.1fr; gap: 18px; align-items: start; }
    .panel { background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 20px; }
    .panel h2 { margin: 0 0 14px; font-size: 20px; }
    .info { display: grid; gap: 11px; color: #555; line-height: 1.7; }
    .info strong { color: #171717; }
    details { border-top: 1px solid #eee8df; padding: 14px 0; }
    details:first-of-type { border-top: 0; }
    summary { cursor: pointer; font-weight: 900; }
    details p { margin: 10px 0 0; color: #666; line-height: 1.7; white-space: pre-wrap; }
    label { display: block; margin: 12px 0 6px; font-weight: 900; font-size: 14px; }
    input, textarea { width: 100%; border: 1px solid #ddd5cb; border-radius: 6px; padding: 11px; background: #fff; outline: 0; font: inherit; }
    textarea { min-height: 132px; resize: vertical; }
    button { width: 100%; height: 48px; margin-top: 16px; border: 0; border-radius: 4px; background: #171717; color: #fff; font-weight: 900; cursor: pointer; }
    .message { display: none; margin-top: 12px; padding: 12px; border-radius: 6px; background: #f3f0ea; color: #40513b; line-height: 1.6; }
    .message.show { display: block; }
    .login-required { display: none; margin-top: 12px; padding: 14px; border-radius: 6px; background: #fff6e7; color: #5c3d13; line-height: 1.6; }
    .login-required.show { display: block; }
    .login-required a { text-decoration: underline; font-weight: 900; }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .bar, main { padding: 16px; }
      .brand { font-size: 28px; }
      .nav { font-size: 13px; gap: 10px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/">ELIN</a>
      <nav class="nav">
        <a href="/">쇼핑몰</a>
        <a href="/mypage.html">주문조회</a>
        <a href="/login.html">로그인</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 id="pageTitle">고객센터</h1>
    <p class="lead" id="introText">주문, 입금, 배송, 교환/반품 문의를 남겨주세요. 관리자 페이지에서 접수 내용을 확인하고 답변할 수 있습니다.</p>

    <div class="grid">
      <section class="panel">
        <h2 id="guideTitle">이용 안내</h2>
        <div class="info" id="guideItems"></div>

        <div style="height:18px"></div>
        <h2 id="faqTitle">자주 묻는 질문</h2>
        <div id="faqItems"></div>
      </section>

      <section class="panel">
        <h2>1:1 문의하기</h2>
        <div class="login-required" id="loginRequired">
          <span id="loginRequiredText">문의 접수는 로그인한 회원만 가능합니다.</span> <a id="loginLinkText" href="/login.html">로그인하기</a>
        </div>
        <form id="inquiryForm">
          <label for="subject">제목</label>
          <input id="subject" required placeholder="문의 제목을 입력해주세요" />

          <label for="messageText">문의 내용</label>
          <textarea id="messageText" required placeholder="문의 내용을 자세히 입력해주세요."></textarea>

          <button type="submit">문의 접수</button>
          <div class="message" id="message"></div>
        </form>
      </section>
    </div>
  </main>

  <script>
    const message = document.querySelector("#message");
    let currentMember = null;

    const defaultSettings = {
      title: "고객센터",
      introText: "주문, 입금, 배송, 교환/반품 문의를 남겨주세요. 관리자 페이지에서 접수 내용을 확인하고 답변할 수 있습니다.",
      guideTitle: "이용 안내",
      guideItems: [
        { title: "상담시간", text: "평일 11:00 - 18:00" },
        { title: "점심시간", text: "13:00 - 14:00" },
        { title: "입금계좌", text: "신한은행 110-000-000000 ELIN" },
        { title: "문의 처리", text: "문의 접수 후 관리자 확인 순서대로 답변됩니다." }
      ],
      faqTitle: "자주 묻는 질문",
      faqs: [
        { title: "무통장 입금 확인은 어떻게 되나요?", text: "주문서의 입금자명과 실제 입금자명이 같아야 빠르게 확인됩니다. 입금 확인 후 주문 상태가 배송준비로 변경됩니다." },
        { title: "배송은 얼마나 걸리나요?", text: "상품 준비 후 순차 출고됩니다. 거래처와 재고 상황에 따라 일정이 달라질 수 있습니다." },
        { title: "교환/반품은 가능한가요?", text: "상품 수령 후 7일 이내 문의를 접수해주세요. 착용 흔적, 오염, 택 제거 등 상품 가치가 훼손된 경우 제한될 수 있습니다." }
      ],
      loginRequiredText: "문의 접수는 로그인한 회원만 가능합니다.",
      loginLinkText: "로그인하기"
    };

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, match => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[match]));
    }

    function setText(id, value) {
      document.querySelector(`#${id}`).textContent = value || "";
    }

    function renderCustomerSettings(settings) {
      setText("pageTitle", settings.title);
      setText("introText", settings.introText);
      setText("guideTitle", settings.guideTitle);
      setText("faqTitle", settings.faqTitle);
      setText("loginRequiredText", settings.loginRequiredText);
      setText("loginLinkText", settings.loginLinkText);
      document.title = `ELIN ${settings.title || "고객센터"}`;

      const guideItems = Array.isArray(settings.guideItems) ? settings.guideItems : [];
      document.querySelector("#guideItems").innerHTML = guideItems.map(item => `
        <div><strong>${escapeHtml(item.title)}</strong><br><span>${escapeHtml(item.text)}</span></div>
      `).join("");

      const faqs = Array.isArray(settings.faqs) ? settings.faqs : [];
      document.querySelector("#faqItems").innerHTML = faqs.map((item, index) => `
        <details ${index === 0 ? "open" : ""}>
          <summary>${escapeHtml(item.title)}</summary>
          <p>${escapeHtml(item.text)}</p>
        </details>
      `).join("");
    }

    async function loadSettings() {
      let settings = defaultSettings;
      try {
        const response = await fetch("/api/customer-center-settings");
        if (response.ok) settings = { ...settings, ...(await response.json()) };
      } catch (_) {}
      renderCustomerSettings(settings);
    }

    async function requireMember() {
      try {
        const result = await (await fetch("/api/auth/me")).json();
        currentMember = result.member || null;
      } catch (_) {
        currentMember = null;
      }
      if (!currentMember) {
        document.querySelector("#loginRequired").classList.add("show");
        document.querySelector("#inquiryForm").style.display = "none";
      }
    }

    document.querySelector("#inquiryForm").addEventListener("submit", async event => {
      event.preventDefault();
      if (!currentMember) {
        location.href = "/login.html";
        return;
      }
      const payload = {
        subject: document.querySelector("#subject").value,
        message: document.querySelector("#messageText").value
      };
      const response = await fetch("/api/inquiries", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      message.classList.add("show");
      if (!response.ok) {
        message.textContent = result.error || "문의 접수에 실패했습니다.";
        return;
      }
      message.innerHTML = `문의가 접수되었습니다.<br>접수번호: <strong>${result.id}</strong>`;
      event.target.reset();
    });

    loadSettings();
    requireMember();
  </script>
</body>
</html>
