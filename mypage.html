<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 마이페이지</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fbfaf8; color: #171717; font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    header { border-bottom: 1px solid #e6e0d8; background: #fff; }
    .bar, main { max-width: 1040px; margin: 0 auto; padding: 20px; }
    .bar { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .brand { font-family: Georgia, "Times New Roman", serif; font-size: 34px; letter-spacing: .08em; font-weight: 700; }
    .nav { display: flex; gap: 14px; color: #555; font-size: 14px; }
    h1 { margin: 22px 0 8px; font-size: 30px; }
    h2 { margin: 24px 0 10px; font-size: 22px; }
    .lead { margin: 0 0 18px; color: #6a6a6a; line-height: 1.7; }
    .member-hero { display: none; margin: 18px 0; overflow: hidden; border-radius: 8px; border: 1px solid #e6e0d8; background: #f5f1eb; }
    .member-hero img { display: block; width: 100%; max-height: 360px; object-fit: cover; }
    .panel, .order, .notice, .inquiry { background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 18px; }
    .notice { margin-bottom: 14px; background: #f5f1eb; }
    .list { display: grid; gap: 12px; }
    .meta { color: #6a6a6a; line-height: 1.7; font-size: 14px; }
    .member-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; flex-wrap: wrap; }
    button { border: 0; border-radius: 4px; background: #171717; color: #fff; padding: 11px 14px; font-weight: 900; cursor: pointer; }
    .order strong, .inquiry strong { display: block; margin-bottom: 6px; font-size: 17px; line-height: 1.45; }
    .order-lines { margin: 10px 0; padding: 10px 0; border-block: 1px solid #eee8df; }
    .inquiry { display: grid; gap: 12px; }
    .inquiry .meta { font-size: 13px; line-height: 1.55; }
    .answer { margin-top: 0; padding: 14px 16px; border-radius: 6px; background: #f5f1eb; white-space: pre-wrap; line-height: 1.75; font-size: 15px; color: #222; }
    .answer.reply { display: grid; gap: 10px; }
    .badge { display: inline-flex; align-items: center; justify-self: start; min-height: 24px; padding: 3px 9px; border-radius: 999px; background: #171717; color: #fff; font-size: 12px; font-weight: 900; line-height: 1; }
    .badge.wait { background: #8a6b36; }
    .support { margin-top: 18px; color: #6a6a6a; font-size: 14px; }
    .support a { text-decoration: underline; color: #171717; }
    @media (max-width: 640px) {
      .bar, main { padding: 16px; }
      .brand { font-size: 28px; }
      .nav { font-size: 13px; }
      h1 { font-size: 24px; }
      .panel, .order, .notice, .inquiry { padding: 15px; }
      .order strong, .inquiry strong { font-size: 16px; }
      .answer { padding: 12px; font-size: 14px; line-height: 1.7; }
    }
  </style>
  <link rel="stylesheet" href="/talk-widget.css" />
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/">ELIN</a>
      <nav class="nav">
        <a href="/">쇼핑몰</a>
        <a href="/customer.html">고객센터</a>
        <a href="/login.html">로그인</a>
      </nav>
    </div>
  </header>

  <main>
    <h1 id="pageTitle">마이페이지</h1>
    <p class="lead" id="introText">회원 정보와 주문 내역, 문의 답변을 확인할 수 있습니다.</p>
    <section class="member-hero" id="memberHero"></section>
    <section class="notice" id="noticeBox"></section>
    <section class="panel" id="memberBox">회원 정보를 확인하는 중입니다.</section>

    <h2>주문내역</h2>
    <section class="list" id="orders"></section>

    <h2>내 문의내역</h2>
    <section class="list" id="inquiries"></section>

    <p class="support" id="supportBox"></p>
  </main>

  <script>
    const money = value => Number(value || 0).toLocaleString("ko-KR") + "원";
    const escapeHtml = value => String(value || "").replace(/[&<>"']/g, match => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[match]));
    let pageSettings = {
      pageTitle: "마이페이지",
      introText: "회원 정보와 주문 내역, 문의 답변을 확인할 수 있습니다.",
      noticeText: "무통장 입금 주문은 입금 확인 후 배송이 시작됩니다.",
      loginRequiredText: "로그인이 필요합니다.",
      emptyOrderText: "아직 주문내역이 없습니다.",
      supportText: "문의가 필요하면 고객센터로 연락해주세요.",
      supportLinkText: "고객센터",
      supportLinkUrl: "/customer.html",
      showUsername: true,
      showPhone: true,
      showAddress: true,
      showOrderStatus: true,
      showBankInfo: true,
      showTracking: true
    };
    pageSettings = {
      heroImage: "",
      heroImageAlt: "Member page image",
      memberBoxTitle: "Member info",
      ordersTitle: "Orders",
      inquiriesTitle: "Inquiries",
      loginLinkText: "Login",
      emptyInquiryText: "No inquiries yet.",
      inquiryLinkText: "Ask a question",
      ...pageSettings
    };

    async function loadSettings() {
      try {
        const response = await fetch("/api/member-page-settings");
        if (response.ok) pageSettings = { ...pageSettings, ...(await response.json()) };
      } catch (_) {}
      document.querySelector("#pageTitle").textContent = pageSettings.pageTitle || "마이페이지";
      document.querySelector("#introText").textContent = pageSettings.introText || "";
      const heroImage = String(pageSettings.heroImage || "").trim();
      const hero = document.querySelector("#memberHero");
      hero.style.display = heroImage ? "block" : "none";
      hero.innerHTML = heroImage ? `<img src="${escapeHtml(heroImage)}" alt="${escapeHtml(pageSettings.heroImageAlt || "Member page image")}">` : "";
      const headings = document.querySelectorAll("main h2");
      if (headings[0]) headings[0].textContent = pageSettings.ordersTitle || "Orders";
      if (headings[1]) headings[1].textContent = pageSettings.inquiriesTitle || "Inquiries";
      document.querySelector("#noticeBox").textContent = pageSettings.noticeText || "";
      document.querySelector("#noticeBox").style.display = pageSettings.noticeText ? "" : "none";
      document.querySelector("#supportBox").innerHTML = `${escapeHtml(pageSettings.supportText || "")} ${pageSettings.supportLinkUrl ? `<a href="${escapeHtml(pageSettings.supportLinkUrl)}">${escapeHtml(pageSettings.supportLinkText || "바로가기")}</a>` : ""}`;
    }

    function memberInfo(member) {
      const rows = [];
      if (pageSettings.showUsername) rows.push(`아이디 ${escapeHtml(member.username || "-")}`);
      if (pageSettings.showPhone) rows.push(`연락처 ${escapeHtml(member.phone || "-")}`);
      if (pageSettings.showAddress) rows.push(`주소 ${escapeHtml(member.address || "-")}`);
      return rows.join(" · ");
    }

    function orderCard(order) {
      const itemText = (order.items || []).map(item => `${escapeHtml(item.name)} ${escapeHtml(item.color || "기본")}/${escapeHtml(item.size || "FREE")} ${Number(item.qty || 0)}개`).join(", ");
      const lines = [];
      if (pageSettings.showOrderStatus) lines.push(`${escapeHtml(order.status || "주문접수")} · ${new Date(order.createdAt || order.created_at).toLocaleString("ko-KR")}`);
      if (pageSettings.showBankInfo) lines.push(`${escapeHtml(order.customer?.paymentMethod || "무통장입금")} · ${escapeHtml(order.customer?.bank || "")} · 입금자 ${escapeHtml(order.customer?.depositor || order.customer?.name || "")}`);
      if (pageSettings.showTracking && (order.tracking_company || order.tracking_number)) lines.push(`배송 ${escapeHtml(order.tracking_company || "")} ${escapeHtml(order.tracking_number || "")}`);
      return `
        <article class="order">
          <strong>${escapeHtml(order.id)}</strong>
          ${lines.map(line => `<div class="meta">${line}</div>`).join("")}
          <div class="order-lines meta">${itemText}</div>
          <div><strong>${money(order.total)}</strong></div>
        </article>
      `;
    }

    function inquiryCard(inquiry) {
      const hasAnswer = Boolean(String(inquiry.answer || "").trim());
      return `
        <article class="inquiry">
          <strong>${escapeHtml(inquiry.subject || "문의")}</strong>
          <div class="meta">${escapeHtml(inquiry.id)} · ${escapeHtml(inquiry.status || "접수")} · ${inquiry.createdAt ? new Date(inquiry.createdAt).toLocaleString("ko-KR") : "-"}</div>
          <div class="answer">${escapeHtml(inquiry.message || "")}</div>
          <div class="answer reply">
            <span class="badge ${hasAnswer ? "" : "wait"}">${hasAnswer ? "답변완료" : "답변대기"}</span>
            <div>${hasAnswer ? escapeHtml(inquiry.answer) : "아직 관리자 답변이 등록되지 않았습니다."}</div>
          </div>
        </article>
      `;
    }

    async function load() {
      await loadSettings();
      const lastOrder = JSON.parse(sessionStorage.getItem("elinLastOrder") || "null");
      if (lastOrder) {
        const completeBox = document.createElement("section");
        completeBox.className = "notice";
        completeBox.innerHTML = `
          <strong style="display:block;margin-bottom:8px">주문이 완료되었습니다.</strong>
          <div class="meta">주문번호 ${escapeHtml(lastOrder.id)} · 입금계좌 ${escapeHtml(lastOrder.bank)} · 입금금액 ${money(lastOrder.total)}</div>
          <div class="meta">입금 확인 후 관리자가 배송을 진행합니다.</div>
        `;
        document.querySelector("#memberBox").before(completeBox);
        sessionStorage.removeItem("elinLastOrder");
      }
      const me = await (await fetch("/api/auth/me")).json();
      if (!me.member) {
        document.querySelector("#memberBox").innerHTML = `${escapeHtml(pageSettings.loginRequiredText || "로그인이 필요합니다.")} <a href="/login.html">${escapeHtml(pageSettings.loginLinkText || "로그인하기")}</a>`;
        document.querySelector("#orders").innerHTML = "";
        document.querySelector("#inquiries").innerHTML = "";
        return;
      }

      document.querySelector("#memberBox").innerHTML = `
        <h2 style="margin-top:0">${escapeHtml(pageSettings.memberBoxTitle || "Member info")}</h2>
        <div class="member-head">
          <div>
            <strong>${escapeHtml(me.member.name)}</strong>
            <div class="meta">${memberInfo(me.member)}</div>
          </div>
          <button type="button" onclick="logout()">로그아웃</button>
        </div>
      `;

      const orderResponse = await fetch("/api/member/orders");
      const orders = orderResponse.ok ? await orderResponse.json() : [];
      document.querySelector("#orders").innerHTML = orders.length ? orders.map(orderCard).join("") : `<p>${escapeHtml(pageSettings.emptyOrderText || "아직 주문내역이 없습니다.")}</p>`;

      if (location.hash === "#orders") {
        setTimeout(() => document.querySelector("#orders")?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
      }
      const inquiryResponse = await fetch("/api/member/inquiries");
      const inquiries = inquiryResponse.ok ? await inquiryResponse.json() : [];
      document.querySelector("#inquiries").innerHTML = inquiries.length ? inquiries.map(inquiryCard).join("") : `<p>${escapeHtml(pageSettings.emptyInquiryText || "아직 문의내역이 없습니다.")} <a href="/customer.html">${escapeHtml(pageSettings.inquiryLinkText || "문의하기")}</a></p>`;
    }

    async function logout() {
      await fetch("/api/auth/logout", { method: "POST" });
      location.href = "/";
    }

    load();
  </script>
  <script src="/talk-widget.js"></script>
</body>
</html>
