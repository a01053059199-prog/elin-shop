<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 마이페이지</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fbfaf8; color: #171717; font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    header { border-bottom: 1px solid #e6e0d8; background: #fff; }
    .bar, main { max-width: 1040px; margin: 0 auto; padding: 20px; }
    .bar { display: flex; justify-content: space-between; align-items: center; }
    .brand { font-family: Georgia, "Times New Roman", serif; font-size: 34px; letter-spacing: .08em; font-weight: 700; }
    .panel, .order { background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 18px; }
    h1 { margin: 20px 0 14px; }
    .list { display: grid; gap: 12px; }
    .meta { color: #6a6a6a; line-height: 1.6; font-size: 14px; }
    button { border: 0; border-radius: 4px; background: #171717; color: #fff; padding: 11px 14px; font-weight: 900; cursor: pointer; }
  </style>
</head>
<body>
  <header><div class="bar"><a class="brand" href="/">ELIN</a><a href="/login.html">로그인</a></div></header>
  <main>
    <section class="panel" id="memberBox">회원 정보를 확인하는 중입니다.</section>
    <h1>주문내역</h1>
    <section class="list" id="orders"></section>
  </main>
  <script>
    const money = value => Number(value || 0).toLocaleString("ko-KR") + "원";
    async function load() {
      const me = await (await fetch("/api/auth/me")).json();
      if (!me.member) {
        document.querySelector("#memberBox").innerHTML = `로그인이 필요합니다. <a href="/login.html">로그인하기</a>`;
        document.querySelector("#orders").innerHTML = "";
        return;
      }
      document.querySelector("#memberBox").innerHTML = `
        <strong>${me.member.name}</strong>
        <div class="meta">아이디 ${me.member.username || "-"} · ${me.member.phone || "-"} · ${me.member.address || "-"}</div>
        <button type="button" onclick="logout()">로그아웃</button>
      `;
      const response = await fetch("/api/member/orders");
      const orders = response.ok ? await response.json() : [];
      document.querySelector("#orders").innerHTML = orders.length ? orders.map(order => `
        <article class="order">
          <strong>${order.id}</strong>
          <div class="meta">${order.status} · ${new Date(order.createdAt || order.created_at).toLocaleString("ko-KR")}</div>
          <div class="meta">${order.items.map(item => `${item.name} ${item.color || "기본"}/${item.size || "FREE"} ${item.qty}개`).join(", ")}</div>
          <div><strong>${money(order.total)}</strong></div>
        </article>
      `).join("") : "<p>아직 주문내역이 없습니다.</p>";
    }
    async function logout() {
      await fetch("/api/auth/logout", { method: "POST" });
      location.href = "/";
    }
    load();
  </script>
</body>
</html>
