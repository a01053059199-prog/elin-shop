<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 주문서</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fbfaf8; color: #171717; font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    header { border-bottom: 1px solid #e6e0d8; background: #fff; }
    .bar, main { max-width: 1120px; margin: 0 auto; padding: 20px; }
    .bar { display: flex; align-items: center; justify-content: space-between; }
    .brand { font-family: Georgia, "Times New Roman", serif; font-size: 34px; letter-spacing: .08em; font-weight: 700; }
    main { display: grid; grid-template-columns: 1fr 390px; gap: 24px; }
    h1 { margin: 18px 0 6px; font-size: 28px; }
    .note { margin: 0 0 22px; color: #6a6a6a; }
    .panel { background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 20px; }
    label { display: block; margin: 14px 0 7px; font-weight: 800; font-size: 14px; }
    input, textarea { width: 100%; border: 1px solid #ddd5cb; border-radius: 6px; padding: 12px; outline: 0; background: #fff; }
    textarea { min-height: 96px; resize: vertical; }
    select { width: 100%; border: 1px solid #ddd5cb; border-radius: 6px; padding: 12px; outline: 0; background: #fff; }
    .item { display: grid; grid-template-columns: 72px 1fr; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee7df; }
    .item img { width: 72px; height: 72px; border-radius: 6px; object-fit: cover; }
    .item b { display: block; margin-bottom: 5px; }
    .item span { color: #6a6a6a; font-size: 13px; }
    .total { display: flex; justify-content: space-between; margin: 18px 0; font-size: 20px; font-weight: 900; }
    button { width: 100%; height: 48px; border: 0; border-radius: 4px; background: #171717; color: #fff; font-weight: 900; cursor: pointer; }
    .message { margin-top: 14px; padding: 13px; border-radius: 6px; background: #f3f0ea; color: #40513b; line-height: 1.55; display: none; }
    .message.show { display: block; }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } }
  </style>
  <link rel="stylesheet" href="/talk-widget.css" />
</head>
<body>
  <header><div class="bar"><a class="brand" href="/">ELIN</a><nav><a href="/">쇼핑 계속하기</a> · <a href="#" id="logoutLink" style="display:none">로그아웃</a></nav></div></header>
  <main>
    <section>
      <h1>주문서 작성</h1>
      <p class="note">현재 버전은 무통장/수기 확인 주문으로 저장됩니다. 결제 PG 키를 받으면 카드 결제를 붙일 수 있습니다.</p>
      <form class="panel" id="orderForm">
        <label for="name">주문자명</label>
        <input id="name" required autocomplete="name" />
        <label for="phone">연락처</label>
        <input id="phone" required placeholder="010-0000-0000" autocomplete="tel" />
        <label for="address">배송지</label>
        <input id="address" required autocomplete="street-address" />
      <label for="memo">배송 메모</label>
      <textarea id="memo" placeholder="공동현관 비밀번호, 요청사항 등"></textarea>
      <label for="depositor">입금자명</label>
      <input id="depositor" required placeholder="주문자와 다르면 실제 입금자명을 입력하세요" />
      <label for="bank">입금 계좌</label>
      <select id="bank">
        <option value="신한은행 110-000-000000 ELIN">신한은행 110-000-000000 ELIN</option>
        <option value="국민은행 000000-00-000000 ELIN">국민은행 000000-00-000000 ELIN</option>
        <option value="카카오뱅크 3333-00-0000000 ELIN">카카오뱅크 3333-00-0000000 ELIN</option>
      </select>
      <div class="message show" style="display:block">주문 저장 후 선택한 계좌로 입금해 주세요. 관리자가 입금 확인 후 배송을 진행합니다.</div>
      <div class="message" id="message"></div>
      </form>
    </section>
    <aside class="panel">
      <h2>주문 상품</h2>
      <div id="items"></div>
      <div class="total"><span>합계</span><span id="total">0원</span></div>
      <button form="orderForm" type="submit">주문완료</button>
    </aside>
  </main>
  <script>
    const cart = JSON.parse(localStorage.getItem("elinCart") || "[]");
    const money = value => value.toLocaleString("ko-KR") + "원";
    const itemsEl = document.querySelector("#items");
    const totalEl = document.querySelector("#total");
    const message = document.querySelector("#message");

    function render() {
      itemsEl.innerHTML = cart.length ? cart.map(item => `
        <div class="item">
          <img src="${item.image}" alt="${item.name}">
          <div><b>${item.name}</b><span>${item.color || "기본"} / ${item.size || "FREE"} · ${money(item.price)} · ${item.qty}개</span></div>
        </div>
      `).join("") : "<p>장바구니가 비어 있습니다.</p>";
      totalEl.textContent = money(cart.reduce((sum, item) => sum + item.price * item.qty, 0));
    }

    document.querySelector("#orderForm").addEventListener("submit", async event => {
      event.preventDefault();
      if (!cart.length) return;
      const order = {
        customer: {
          name: document.querySelector("#name").value,
          phone: document.querySelector("#phone").value,
          address: document.querySelector("#address").value,
          memo: document.querySelector("#memo").value,
          depositor: document.querySelector("#depositor").value,
          bank: document.querySelector("#bank").value
        },
        items: cart.map(item => ({ id: item.id, qty: item.qty, color: item.color, size: item.size }))
      };
      const response = await fetch("/api/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(order)
      });
      const result = await response.json();
      message.classList.add("show");
      if (!response.ok) {
        message.textContent = result.error || "주문 저장에 실패했습니다.";
        return;
      }
      localStorage.removeItem("elinCart");
      message.innerHTML = `
        <strong style="display:block;font-size:18px;margin-bottom:8px">주문이 완료되었습니다.</strong>
        <div>아래 계좌로 입금해주시면 관리자가 확인 후 배송을 진행합니다.</div>
        <div style="height:10px"></div>
        <div>주문번호: <strong>${result.id}</strong></div>
        <div>입금계좌: <strong>${result.customer.bank}</strong></div>
        <div>입금금액: <strong>${money(Number(result.total || 0))}</strong></div>
        <div>입금자명: <strong>${result.customer.depositor}</strong></div>
        <div style="height:10px"></div>
        <div style="color:#6a6a6a">입금자명이 다르면 확인이 늦어질 수 있습니다.</div>
      `;
      message.scrollIntoView({ behavior: "smooth", block: "center" });
    });
    async function loadMember() {
      const response = await fetch("/api/auth/me");
      if (!response.ok) {
        alert("로그인 후 주문할 수 있습니다.");
        location.href = "/login.html";
        return;
      }
      const result = await response.json();
      if (!result.member) {
        alert("로그인 후 주문할 수 있습니다.");
        location.href = "/login.html";
        return;
      }
      document.querySelector("#name").value = result.member.name || "";
      document.querySelector("#phone").value = result.member.phone || "";
      document.querySelector("#address").value = result.member.address || "";
      document.querySelector("#depositor").value = result.member.name || "";
      document.querySelector("#logoutLink").style.display = "";
    }
    document.querySelector("#logoutLink").addEventListener("click", async event => {
      event.preventDefault();
      await fetch("/api/auth/logout", { method: "POST" });
      location.href = "/";
    });
    render();
    loadMember();
  </script>
  <script src="/talk-widget.js"></script>
</body>
</html>
