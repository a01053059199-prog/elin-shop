<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELIN 관리자</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fbfaf8; color: #171717; font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    header { background: #111; color: #fff; }
    .bar, main { max-width: 1240px; margin: 0 auto; padding: 18px 22px; }
    .bar { display: flex; justify-content: space-between; align-items: center; }
    .brand { font-family: Georgia, "Times New Roman", serif; font-size: 32px; letter-spacing: .08em; }
    h1 { margin: 22px 0 8px; }
    .note { color: #6a6a6a; margin: 0 0 20px; line-height: 1.6; }
    .login, .panel { background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 18px; }
    .login { max-width: 460px; }
    input, select, textarea { width: 100%; border: 1px solid #ddd5cb; border-radius: 6px; padding: 10px; outline: 0; background: #fff; }
    textarea { min-height: 72px; resize: vertical; }
    label { display: block; font-size: 13px; font-weight: 800; margin: 12px 0 6px; }
    button { border: 0; border-radius: 4px; background: #171717; color: #fff; padding: 10px 13px; font-weight: 900; cursor: pointer; }
    .ghost { background: #f3f0ea; color: #171717; }
    .danger { background: #b71f2a; }
    .tabs, .filters { display: flex; gap: 8px; margin: 18px 0; flex-wrap: wrap; align-items: center; }
    .tabs button.active { background: #b71f2a; }
    .dashboard { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin: 18px 0; }
    .metric { background: #fff; border: 1px solid #e6e0d8; border-radius: 8px; padding: 14px; }
    .metric strong { display: block; font-size: 22px; margin-bottom: 4px; }
    .metric span { color: #6a6a6a; font-size: 13px; }
    .grid { display: grid; grid-template-columns: 380px 1fr; gap: 18px; align-items: start; }
    .list { display: grid; gap: 10px; }
    .product { display: grid; grid-template-columns: 80px 1fr auto; gap: 12px; align-items: center; border: 1px solid #e6e0d8; border-radius: 8px; padding: 10px; background: #fff; }
    .order { display: grid; grid-template-columns: 1fr 320px; gap: 14px; border: 1px solid #e6e0d8; border-radius: 8px; padding: 14px; background: #fff; }
    .product img { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; background: #f3f0ea; }
    .meta { color: #6a6a6a; font-size: 13px; line-height: 1.6; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .hidden { display: none; }
    .image-preview { width: 100%; min-height: 160px; border: 1px dashed #cfc7bc; border-radius: 8px; background: #f8f6f2; display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); gap: 8px; padding: 8px; color: #777; font-size: 13px; }
    .image-preview.empty { display: grid; place-items: center; grid-template-columns: 1fr; }
    .image-preview img { width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; object-fit: cover; background: #eee8df; }
    .hint { margin-top: 7px; color: #777; font-size: 12px; line-height: 1.45; }
    .stock-low { color: #b71f2a; font-weight: 900; }
    @media (max-width: 980px) {
      .grid, .order, .product, .dashboard { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">ELIN ADMIN</div>
      <a href="/">쇼핑몰 보기</a>
    </div>
  </header>

  <main>
    <h1>관리자 페이지</h1>
    <p class="note">상품 등록, 이미지 업로드, 주문 검색, 입금 확인, 송장 입력, 관리자 메모를 관리할 수 있습니다.</p>

    <section class="login" id="loginBox">
      <label for="username">아이디</label>
      <input id="username" autocomplete="username" placeholder="admin" />
      <label for="password">비밀번호</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="1234" />
      <div style="height:12px"></div>
      <button id="loginBtn">로그인</button>
    </section>

    <section id="adminApp" class="hidden">
      <div class="dashboard" id="dashboard"></div>

      <div class="tabs">
        <button class="active" data-tab="products">상품 관리</button>
        <button data-tab="orders">주문 관리</button>
        <button class="ghost" id="logoutBtn" type="button">로그아웃</button>
      </div>

      <div id="productsTab" class="grid">
        <form class="panel" id="productForm">
          <h2>상품 등록/수정</h2>
          <input type="hidden" id="productId" />

          <label for="name">상품명</label>
          <input id="name" required />

          <label for="category">카테고리</label>
          <select id="category">
            <option value="women">여성</option>
            <option value="men">남성</option>
            <option value="bag">가방</option>
            <option value="shoes">슈즈</option>
          </select>

          <label for="keywords">검색 키워드</label>
          <input id="keywords" placeholder="여성 의류 자켓" />

          <label for="label">라벨</label>
          <input id="label" placeholder="NEW" />

          <label for="price">판매가</label>
          <input id="price" type="number" required />

          <label for="old">정가</label>
          <input id="old" type="number" />

          <label for="stock">재고</label>
          <input id="stock" type="number" required />

          <label for="imageFile">상품 이미지 업로드</label>
          <input id="imageFile" type="file" accept="image/*" multiple />
          <div class="hint">권장: 1MB 이하 JPG/PNG. 큰 이미지는 저장이 느릴 수 있습니다.</div>
          <div class="image-preview" id="imagePreview">이미지 미리보기</div>

          <label for="image">이미지 URL 또는 업로드 데이터</label>
          <textarea id="image" required rows="5" placeholder="이미지 URL을 한 줄에 하나씩 넣거나 위에서 파일을 선택하세요. 최대 10장"></textarea>

          <div style="height:12px"></div>
          <button type="submit">저장</button>
          <button type="button" class="ghost" id="resetForm">새 상품 입력</button>
        </form>
        <div>
          <div class="filters">
            <input id="productSearch" placeholder="상품명/카테고리 검색" />
            <select id="productCategory">
              <option value="">전체 카테고리</option>
              <option value="women">여성</option>
              <option value="men">남성</option>
              <option value="bag">가방</option>
              <option value="shoes">슈즈</option>
            </select>
          </div>
          <div class="list" id="productList"></div>
        </div>
      </div>

      <div id="ordersTab" class="hidden">
        <div class="filters">
          <input id="orderSearch" placeholder="주문번호/고객명/연락처/입금자 검색" />
          <select id="orderStatus">
            <option value="">전체 상태</option>
            <option>입금대기</option>
            <option>입금확인</option>
            <option>배송준비</option>
            <option>배송중</option>
            <option>배송완료</option>
            <option>취소</option>
          </select>
        </div>
        <div class="list" id="orderList"></div>
      </div>
    </section>
  </main>

  <script>
    let products = [];
    let orders = [];
    const money = value => Number(value || 0).toLocaleString("ko-KR") + "원";
    const headers = () => ({ "Content-Type": "application/json" });

    document.querySelector("#loginBtn").addEventListener("click", async () => {
      const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({
          username: document.querySelector("#username").value || "admin",
          password: document.querySelector("#password").value || "1234"
        })
      });
      if (!response.ok) {
        const result = await response.json();
        return alert(result.error || "로그인에 실패했습니다.");
      }
      showAdmin();
      await refresh();
    });

    document.querySelector("#logoutBtn").addEventListener("click", async () => {
      await fetch("/api/admin/logout", { method: "POST" });
      document.querySelector("#adminApp").classList.add("hidden");
      document.querySelector("#loginBox").classList.remove("hidden");
    });

    document.querySelectorAll(".tabs button").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tabs button").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        document.querySelector("#productsTab").classList.toggle("hidden", button.dataset.tab !== "products");
        document.querySelector("#ordersTab").classList.toggle("hidden", button.dataset.tab !== "orders");
      });
    });

    document.querySelector("#imageFile").addEventListener("change", async event => {
      const files = [...event.target.files].slice(0, 10);
      if (!files.length) return;
      if (event.target.files.length > 10) alert("상품 이미지는 최대 10장까지 등록할 수 있습니다.");
      for (const file of files) {
        if (!file.type.startsWith("image/")) {
          alert("이미지 파일만 선택할 수 있습니다.");
          event.target.value = "";
          return;
        }
        if (file.size > 2_500_000) {
          alert("이미지는 1장당 2.5MB 이하로 선택해주세요.");
          event.target.value = "";
          return;
        }
      }
      const uploaded = await Promise.all(files.map(readImageFile));
      const current = parseImages(formValue("image"));
      const images = [...current, ...uploaded].slice(0, 10);
      setValue("image", images.join("\n"));
      renderImagePreview(images);
      event.target.value = "";
    });

    document.querySelector("#image").addEventListener("input", event => renderImagePreview(event.target.value));
    document.querySelector("#productSearch").addEventListener("input", renderProducts);
    document.querySelector("#productCategory").addEventListener("change", renderProducts);
    document.querySelector("#orderSearch").addEventListener("input", renderOrders);
    document.querySelector("#orderStatus").addEventListener("change", renderOrders);

    async function refresh() {
      products = await (await fetch("/api/products")).json();
      orders = await (await fetch("/api/orders", { headers: headers() })).json();
      renderDashboard();
      renderProducts();
      renderOrders();
    }

    function showAdmin() {
      document.querySelector("#loginBox").classList.add("hidden");
      document.querySelector("#adminApp").classList.remove("hidden");
    }

    function renderDashboard() {
      const sales = orders.filter(order => order.status !== "취소").reduce((sum, order) => sum + Number(order.total || 0), 0);
      const count = status => orders.filter(order => order.status === status).length;
      const lowStock = products.filter(product => Number(product.stock) <= 3).length;
      document.querySelector("#dashboard").innerHTML = `
        <div class="metric"><strong>${orders.length}</strong><span>총 주문</span></div>
        <div class="metric"><strong>${count("입금대기")}</strong><span>입금대기</span></div>
        <div class="metric"><strong>${count("배송중")}</strong><span>배송중</span></div>
        <div class="metric"><strong>${money(sales)}</strong><span>총 매출</span></div>
        <div class="metric"><strong>${lowStock}</strong><span>재고 부족</span></div>
      `;
    }

    function parseImages(value) {
      if (Array.isArray(value)) return value.filter(Boolean).slice(0, 10);
      if (!value) return [];
      try {
        const parsed = JSON.parse(value);
        if (Array.isArray(parsed)) return parsed.filter(Boolean).slice(0, 10);
      } catch (_) {}
      return String(value).split(/\n|,/).map(item => item.trim()).filter(Boolean).slice(0, 10);
    }

    function productImages(product) {
      const images = parseImages(product.images);
      if (!images.length && product.image) images.push(product.image);
      return images.slice(0, 10);
    }

    function readImageFile(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    function renderImagePreview(src) {
      const preview = document.querySelector("#imagePreview");
      const images = parseImages(src);
      if (!images.length) {
        preview.classList.add("empty");
        preview.textContent = "이미지 미리보기";
        return;
      }
      preview.classList.remove("empty");
      preview.innerHTML = images.map((image, index) => `<img src="${image}" alt="상품 이미지 ${index + 1}">`).join("");
    }

    function renderProducts() {
      const keyword = document.querySelector("#productSearch").value.trim().toLowerCase();
      const category = document.querySelector("#productCategory").value;
      const filtered = products.filter(product => {
        const text = `${product.name} ${product.category} ${product.keywords || ""}`.toLowerCase();
        return (!keyword || text.includes(keyword)) && (!category || product.category === category);
      });
      document.querySelector("#productList").innerHTML = filtered.map(product => `
        <article class="product">
          <img src="${productImages(product)[0] || product.image}" alt="${product.name}">
          <div>
            <strong>${product.name}</strong>
            <div class="meta">${product.category} · ${money(product.price)} · <span class="${Number(product.stock) <= 3 ? "stock-low" : ""}">재고 ${product.stock}개</span></div>
          </div>
          <div class="actions">
            <button class="ghost" onclick="editProduct('${product.id}')">수정</button>
            <button class="danger" onclick="deleteProduct('${product.id}')">삭제</button>
          </div>
        </article>
      `).join("") || "<p>검색 결과가 없습니다.</p>";
    }

    function renderOrders() {
      const keyword = document.querySelector("#orderSearch").value.trim().toLowerCase();
      const statusFilter = document.querySelector("#orderStatus").value;
      const filtered = orders.filter(order => {
        const text = `${order.id} ${order.customer?.name || ""} ${order.customer?.phone || ""} ${order.customer?.depositor || ""}`.toLowerCase();
        return (!keyword || text.includes(keyword)) && (!statusFilter || order.status === statusFilter);
      });
      document.querySelector("#orderList").innerHTML = filtered.length ? filtered.map(order => `
        <article class="order">
          <div>
            <strong>${order.id}</strong>
            <div class="meta">${order.status} · ${new Date(order.createdAt || order.created_at).toLocaleString("ko-KR")}</div>
            <div class="meta">${order.customer.name} · ${order.customer.phone} · ${order.customer.address}</div>
            <div class="meta">${order.items.map(item => `${item.name} ${item.color || "기본"}/${item.size || "FREE"} ${item.qty}개`).join(", ")}</div>
            <div class="meta">${order.customer.paymentMethod || "무통장입금"} · 입금자 ${order.customer.depositor || order.customer.name} · ${order.customer.bank || "계좌 미입력"}</div>
            <div class="meta">합계 ${money(order.total)} · 메모 ${order.customer.memo || "없음"}</div>
            <div class="meta">배송: ${order.tracking_company || "미입력"} ${order.tracking_number || ""}</div>
            <div class="meta">관리자 메모: ${order.admin_memo || "없음"}</div>
          </div>
          <div>
            <label>상태</label>
            <select id="status-${order.id}">
              ${["입금대기", "입금확인", "배송준비", "배송중", "배송완료", "취소"].map(status => `<option ${order.status === status ? "selected" : ""}>${status}</option>`).join("")}
            </select>
            <label>배송사</label>
            <select id="company-${order.id}">
              ${["", "CJ대한통운", "우체국택배", "한진택배", "롯데택배", "로젠택배"].map(company => `<option value="${company}" ${order.tracking_company === company ? "selected" : ""}>${company || "선택 안 함"}</option>`).join("")}
            </select>
            <label>송장번호</label>
            <input id="tracking-${order.id}" value="${order.tracking_number || ""}" placeholder="송장번호">
            <label>관리자 메모</label>
            <textarea id="memo-${order.id}" placeholder="관리자 메모">${order.admin_memo || ""}</textarea>
            <div style="height:10px"></div>
            <button type="button" onclick="saveOrder('${order.id}')">주문 저장</button>
          </div>
        </article>
      `).join("") : "<p>검색 결과가 없습니다.</p>";
    }

    function formValue(id) { return document.querySelector(`#${id}`).value; }
    function setValue(id, value) { document.querySelector(`#${id}`).value = value || ""; }

    document.querySelector("#productForm").addEventListener("submit", async event => {
      event.preventDefault();
      const id = formValue("productId");
      const payload = {
        name: formValue("name"),
        category: formValue("category"),
        keywords: formValue("keywords"),
        label: formValue("label") || "NEW",
        price: Number(formValue("price")),
        old: Number(formValue("old") || formValue("price")),
        stock: Number(formValue("stock")),
        image: parseImages(formValue("image"))[0],
        images: parseImages(formValue("image"))
      };
      const response = await fetch(id ? `/api/products/${id}` : "/api/products", {
        method: id ? "PUT" : "POST",
        headers: headers(),
        body: JSON.stringify(payload)
      });
      if (!response.ok) {
        const result = await response.json();
        alert(result.error || "상품 저장에 실패했습니다.");
        return;
      }
      event.target.reset();
      setValue("productId", "");
      renderImagePreview("");
      await refresh();
    });

    document.querySelector("#resetForm").addEventListener("click", () => {
      document.querySelector("#productForm").reset();
      setValue("productId", "");
      renderImagePreview("");
    });

    window.editProduct = id => {
      const product = products.find(item => item.id === id);
      if (!product) return;
      setValue("productId", product.id);
      setValue("name", product.name);
      setValue("category", product.category);
      setValue("keywords", product.keywords);
      setValue("label", product.label);
      setValue("price", product.price);
      setValue("old", product.old);
      setValue("stock", product.stock);
      setValue("image", productImages(product).join("\n"));
      renderImagePreview(productImages(product));
      scrollTo({ top: 0, behavior: "smooth" });
    };

    window.deleteProduct = async id => {
      if (!confirm("상품을 삭제할까요?")) return;
      await fetch(`/api/products/${id}`, { method: "DELETE", headers: headers() });
      await refresh();
    };

    window.saveOrder = async id => {
      const response = await fetch(`/api/orders/${id}`, {
        method: "PATCH",
        headers: headers(),
        body: JSON.stringify({
          status: document.querySelector(`#status-${id}`).value,
          tracking_company: document.querySelector(`#company-${id}`).value,
          tracking_number: document.querySelector(`#tracking-${id}`).value,
          admin_memo: document.querySelector(`#memo-${id}`).value
        })
      });
      if (!response.ok) {
        const result = await response.json();
        alert(result.error || "주문 저장에 실패했습니다.");
        return;
      }
      await refresh();
    };

    async function restoreSession() {
      const response = await fetch("/api/admin/me");
      if (!response.ok) return;
      showAdmin();
      await refresh();
    }

    restoreSession();
  </script>
</body>
</html>
