<body><main class="wrap"><h1>이용약관</h1><p>본 페이지는 ELIN 쇼핑몰 이용 조건을 안내하기 위한 기본 약관 초안입니다. 실제 운영 전 사업자 정보, 결제, 배송, 환불 정책에 맞춰 최종 검토가 필요합니다.</p><h2>주문 및 결제</h2><p>회원 또는 비회원은 상품을 선택하여 주문할 수 있으며, 결제 완료 또는 주문 접수 후 판매자가 재고와 배송 가능 여부를 확인합니다.</p><h2>취소 및 환불</h2><p>상품 출고 전 취소가 가능하며, 출고 후에는 교환/반품 정책에 따릅니다.</p><p><a href="/">쇼핑몰로 돌아가기</a></p></main></body>
